<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RE:COLLAR — Battle Demo</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #05050a;
    overflow: hidden;
    font-family: "Yu Gothic", "Hiragino Kaku Gothic Pro", "Segoe UI", sans-serif;
  }
  #game-root {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  /* Subtle vignette + scanline mood over the canvas */
  #fx-overlay {
    position: absolute; inset: 0; pointer-events: none; z-index: 10;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);
    mix-blend-mode: multiply;
  }
  #scanlines {
    position: absolute; inset: 0; pointer-events: none; z-index: 11; opacity: 0.10;
    background: repeating-linear-gradient(
      to bottom, rgba(255,255,255,0.0) 0px, rgba(255,255,255,0.0) 2px,
      rgba(0,0,0,0.8) 3px, rgba(0,0,0,0.0) 4px);
  }
  canvas { image-rendering: pixelated; }
  #loading-fallback {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #7a7a9a; font-size: 14px; letter-spacing: 2px; z-index: 1;
  }
</style>
</head>
<body>
  <div id="game-root">
    <div id="loading-fallback">LOADING ENGINE…</div>
  </div>
  <div id="fx-overlay"></div>
  <div id="scanlines"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
  /* =====================================================================

     Author: portfolio build for Cygames internship.
     ===================================================================== */

  // ---- Companions (support from the back line) -----------------------
  const COMPANIONS = {

  /* =====================================================================
     BOOT / PRELOAD
     ===================================================================== */
  class BootScene extends Phaser.Scene {
    constructor() { super('Boot'); }

    preload() {
      const fb = document.getElementById('loading-fallback');
      if (fb) fb.remove();

      // --- Loading bar UI ---
      const bx = GAME_W / 2, by = GAME_H / 2;
      this.add.text(bx, by - 70, 'RE:COLLAR', {
        fontFamily: FONT, fontSize: '46px', color: C.white, fontStyle: 'bold',
      }).setOrigin(0.5).setAlpha(0.9);
      this.add.text(bx, by - 30, 'BATTLE DEMO', {
        fontFamily: FONT, fontSize: '16px', color: C.gold,
      }).setOrigin(0.5).setLetterSpacing ? null : null;
      const sub = this.add.text(bx, by - 28, 'B A T T L E   D E M O', {
        fontFamily: FONT, fontSize: '14px', color: C.gold,
      }).setOrigin(0.5);

      const barW = 360, barH = 14;
      this.add.rectangle(bx, by + 20, barW + 4, barH + 4, 0x000000)
        .setStrokeStyle(2, 0x3a3a55);
      const fill = this.add.rectangle(bx - barW / 2, by + 20, 1, barH, C.goldN)
        .setOrigin(0, 0.5);
      const pct = this.add.text(bx, by + 50, '0%', {
        fontFamily: FONT, fontSize: '13px', color: '#8a8aa8',
      }).setOrigin(0.5);

      this.load.on('progress', (v) => {
        fill.width = Math.max(1, barW * v);
        pct.setText(Math.round(v * 100) + '%');
      });

      // Self-heal transient asset drops (e.g. flaky connection): retry each file up to twice.
      const retryCount = {};
      this.load.on('loaderror', (file) => {
        retryCount[file.key] = (retryCount[file.key] || 0) + 1;
        if (retryCount[file.key] > 2) return;
        const url = Array.isArray(file.url) ? file.url[0] : file.url;
        if (file.type === 'audio') this.load.audio(file.key, url);
        else if (file.type === 'image') this.load.image(file.key, url);
      });

      // --- Images ---
      this.load.image('stage1', 'pic/stage1.png');
      this.load.image('stage2', 'pic/stage2.png');
      this.load.image('stage3', 'pic/stage3.png');
      for (let i = 0; i <= 6; i++) {
        this.load.image('main' + (i === 0 ? '' : i), 'pic/main' + (i === 0 ? '' : i) + '.png');
      }
      for (let i = 1; i <= 6; i++) this.load.image('enemy' + i, 'pic/enemy' + i + '.png');
      this.load.image('slash', 'pic/battleE1.png');
      this.load.image('shield', 'pic/defence.png');

      // --- Audio (SFX) ---
      const se = ['se_slash','se_fastslash','se_hit','se_clash','se_draw','se_guard',
                  'se_thunder','se_holy','se_explosion','se_magiccircle','se_fly',
                  'se_down','se_slowmo','se_fanfare','se_victory'];
      se.forEach(k => this.load.audio(k, 'audio/' + k + '.mp3'));

      // --- Audio (BGM) ---
      // BGM is lazy-loaded per scene (keeps the initial boot small & reliable).
    }

    create() {
      // Generate small particle textures.
      const g = this.make.graphics({ x: 0, y: 0, add: false });
      g.fillStyle(0xffffff, 1); g.fillCircle(8, 8, 8);
      g.generateTexture('spark', 16, 16);
      g.clear(); g.fillStyle(0xffffff, 1); g.fillRect(0, 0, 4, 4);
      g.generateTexture('px', 4, 4);
      g.clear();
      // soft star for victory confetti
      g.fillStyle(0xffffff, 1); g.fillRect(0, 0, 6, 6);
      g.generateTexture('conf', 6, 6);
      g.destroy();

      // Player attack animation (main .. main6)
      this.anims.create({
        key: 'alicia_attack',
        frames: [
          { key: 'main' }, { key: 'main1' }, { key: 'main2' }, { key: 'main3' },
          { key: 'main4' }, { key: 'main5' }, { key: 'main6' },
        ],
        frameRate: 16, repeat: 0,
      });
      // Demon idle (enemy3..6 loop)
      this.anims.create({
        key: 'demon_idle',
        frames: [{ key: 'enemy3' }, { key: 'enemy4' }, { key: 'enemy5' }, { key: 'enemy6' }],
        frameRate: 2, repeat: -1,
      });

      this.scene.start('Title');
    }
  }

  /* =====================================================================
     TITLE
     ===================================================================== */
  class TitleScene extends Phaser.Scene {
    constructor() { super('Title'); }

    create() {
      // Dim dark-throne background.
      const bg = this.add.image(GAME_W / 2, GAME_H / 2, 'stage3');
      fitCover(bg, GAME_W, GAME_H);
      bg.setTint(0x55557a);
      this.add.rectangle(GAME_W / 2, GAME_H / 2, GAME_W, GAME_H, 0x05050f, 0.45);

      // Faint duel silhouettes.
      const alicia = this.add.image(250, GROUND_Y + 20, 'main').setOrigin(0.5, 1).setScale(2.4).setAlpha(0.85);
      const demon = this.add.image(720, GROUND_Y + 20, 'enemy3').setOrigin(0.5, 1).setScale(2.7).setAlpha(0.85).setFlipX(false);
      this.tweens.add({ targets: alicia, y: '-=8', duration: 1600, yoyo: true, repeat: -1, ease: 'Sine.inOut' });
      this.tweens.add({ targets: demon, y: '-=12', duration: 2000, yoyo: true, repeat: -1, ease: 'Sine.inOut' });

      // Title logo.
      const t1 = this.add.text(GAME_W / 2, 150, 'RE:COLLAR', {
        fontFamily: FONT, fontSize: '88px', color: C.white, fontStyle: 'bold',
        stroke: '#1a1030', strokeThickness: 10,
      }).setOrigin(0.5).setShadow(0, 6, '#000000', 12, true, true);
      const grad = t1.context.createLinearGradient(0, 0, 0, t1.height);
      grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.5, '#ffe9a8'); grad.addColorStop(1, '#e0a23a');
      t1.setFill(grad);

      this.add.text(GAME_W / 2, 214, 'B A T T L E   D E M O', {
        fontFamily: FONT, fontSize: '20px', color: C.gold, fontStyle: 'bold',
      }).setOrigin(0.5);
      this.add.text(GAME_W / 2, 250, 'タイミング・ターンバトル', {
        fontFamily: FONT, fontSize: '14px', color: '#b9b9d6',
      }).setOrigin(0.5);

      // Press start (blinking).
      const press = this.add.text(GAME_W / 2, 380, '▶  PRESS  ENTER  /  CLICK  TO  START', {
        fontFamily: FONT, fontSize: '22px', color: C.white, fontStyle: 'bold',
      }).setOrigin(0.5);
      this.tweens.add({ targets: press, alpha: { from: 1, to: 0.25 }, duration: 700, yoyo: true, repeat: -1 });

      // Controls hint.
      this.add.text(GAME_W / 2, GAME_H - 56,
        '◀ ▶ コマンド選択   /   SPACE・ENTER 決定&タイミング   /   M ミュート',
        { fontFamily: FONT, fontSize: '13px', color: '#8a8aa8' }).setOrigin(0.5);
      this.add.text(GAME_W / 2, GAME_H - 32,
        'エリシア が 魔王アリア に挑む2連戦。攻守どちらもタイミングが命。ODゲージを溜めて必殺技を放て！',
        { fontFamily: FONT, fontSize: '12px', color: '#6a6a88' }).setOrigin(0.5);

      // Audio: attempt title BGM; resume context on first gesture.
      this.input.once('pointerdown', () => this.sound.context.resume && this.sound.context.resume());
      try { lazyBgm(this, 'bgm_title', 0.35); } catch (e) {}

      const start = () => {
        if (this._started) return; this._started = true;
        this.sound.context.resume && this.sound.context.resume();
        sfx(this, 'se_draw', 0.6);
        this.cameras.main.fadeOut(450, 0, 0, 0);
        this.cameras.main.once('camerafadeoutcomplete', () => {
          this.scene.start('Select', {
            index: 0, hp: PLAYER_BASE.maxHp, mp: PLAYER_BASE.maxMp, sp: 0,
            stats: { turns: 0, perfect: 0, maxCombo: 0 },
          });
        });
      };
      this.input.keyboard.on('keydown-ENTER', start);
      this.input.keyboard.on('keydown-SPACE', start);
      this.input.on('pointerdown', start);
      this.input.keyboard.on('keydown-M', () => { this.sound.mute = !this.sound.mute; });
    }
  }

  /* =====================================================================
     TUTORIAL
     ===================================================================== */

      this.cameras.main.fadeOut(350, 0, 0, 0);
      this.cameras.main.once('camerafadeoutcomplete', () => this.scene.start('Select', this.nextData));
