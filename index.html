     RESULT
     ===================================================================== */
  class ResultScene extends Phaser.Scene {
    constructor() { super('Result'); }
    init(data) { this.win = data.win; this.stats = data.stats || {}; }

    create() {
      const W = GAME_W, H = GAME_H;
      const bg = this.add.image(W / 2, H / 2, this.win ? 'stage2' : 'stage3');
      fitCover(bg, W, H);
      this.add.rectangle(W / 2, H / 2, W, H, 0x05050f, this.win ? 0.35 : 0.62);

      // stop battle bgm, play result audio
      stopBgm(this);
      if (this.win) {
        sfx(this, 'se_fanfare', 0.6);
        this.time.delayedCall(200, () => sfx(this, 'se_victory', 0.5));
        this.time.delayedCall(1400, () => lazyBgm(this, 'bgm_battle', 0.3));
      } else {
        sfx(this, 'se_down', 0.6);
        this.time.delayedCall(900, () => lazyBgm(this, 'bgm_boss', 0.18));
      }

      const title = this.add.text(W / 2, 150, this.win ? 'VICTORY' : 'DEFEAT', {
        fontFamily: FONT, fontSize: '92px', fontStyle: 'bold',
        color: this.win ? C.gold : C.red, stroke: C.ink, strokeThickness: 10,
      }).setOrigin(0.5).setScale(0.3);
      this.tweens.add({ targets: title, scale: 1, duration: 500, ease: 'Back.out' });
      this.tweens.add({ targets: title, y: 148, duration: 1800, yoyo: true, repeat: -1, ease: 'Sine.inOut' });

      this.add.text(W / 2, 210, this.win ? '魔王アリア ー かつての友を、討ち果たした…' : 'エリシア は 倒れた…', {
        fontFamily: FONT, fontSize: '18px', color: C.white,
      }).setOrigin(0.5);

      // Stats panel
      const panelY = 290;
      this.add.rectangle(W / 2, panelY + 30, 420, 130, 0x0a0a18, 0.7).setStrokeStyle(2, 0x44446a);
      const rows = [
        ['経過ターン', (this.stats.turns || 0) + ''],
        ['PERFECT 判定', (this.stats.perfect || 0) + ' 回'],
        ['最大コンボ', '×' + (this.stats.maxCombo || 0)],
      ];
      rows.forEach((r, i) => {
        const y = panelY + i * 30;
        this.add.text(W / 2 - 180, y, r[0], { fontFamily: FONT, fontSize: '16px', color: '#c7c7e0' }).setOrigin(0, 0.5);
        this.add.text(W / 2 + 180, y, r[1], { fontFamily: FONT, fontSize: '18px', color: C.gold, fontStyle: 'bold' }).setOrigin(1, 0.5);
      });

      // Rank
      if (this.win) {
        const score = (this.stats.perfect || 0) * 10 + (this.stats.maxCombo || 0) * 8 - (this.stats.turns || 0) * 2;
        let rank = 'C';
        if (score >= 110) rank = 'S'; else if (score >= 80) rank = 'A'; else if (score >= 50) rank = 'B';

        const rankColors = { S: C.gold, A: '#d0d8ff', B: '#88e0aa', C: '#c7c7e0' };
        const rankMsgs = {
          S: '完全制覇！― 伝説の戦士',
          A: '見事な戦い！ 称賛に値する',
          B: 'よく戦った。次はさらに上を',
          C: '戦いは終わった…さらに磨け',
        };

        // Rank letter
        const rk = this.add.text(W / 2, panelY + 90, rank, {
          fontFamily: FONT, fontSize: '72px', color: rankColors[rank], fontStyle: 'bold',
          stroke: C.ink, strokeThickness: 12,
        }).setOrigin(0.5).setAlpha(0).setScale(0.2);
        this.time.delayedCall(600, () => {
          sfx(this, rank === 'S' ? 'se_magiccircle' : 'se_fastslash', 0.5);
          this.tweens.add({ targets: rk, alpha: 1, scale: 1, duration: 420, ease: 'Back.out' });
          if (rank === 'S') {
            this.cameras.main.shake(200, 0.012);
            this.spawnRankParticles(W / 2, panelY + 90, 0xffd060);
          } else if (rank === 'A') {
            this.spawnRankParticles(W / 2, panelY + 90, 0xa0b0ff);
          }
        });

        // Rank message
        const msg = this.add.text(W / 2, panelY + 156, rankMsgs[rank], {
          fontFamily: FONT, fontSize: '16px', color: rankColors[rank],
        }).setOrigin(0.5).setAlpha(0);
        this.time.delayedCall(1100, () => {
          this.tweens.add({ targets: msg, alpha: 1, duration: 380 });
        });

        this.confetti();
      }

      const press = this.add.text(W / 2, H - 70, '▶  PRESS  ENTER  TO  RETRY', {
        fontFamily: FONT, fontSize: '20px', color: C.white, fontStyle: 'bold',
      }).setOrigin(0.5);
      this.tweens.add({ targets: press, alpha: { from: 1, to: 0.3 }, duration: 700, yoyo: true, repeat: -1 });
      this.add.text(W / 2, H - 40, 'タイトルに戻ります', { fontFamily: FONT, fontSize: '12px', color: '#8a8aa8' }).setOrigin(0.5);

      this.cameras.main.fadeIn(400, 0, 0, 0);
      const back = () => {
        if (this._b) return; this._b = true;
        stopBgm(this);
        this.cameras.main.fadeOut(350, 0, 0, 0);
        this.cameras.main.once('camerafadeoutcomplete', () => this.scene.start('Title'));
      };
      this.time.delayedCall(900, () => {
        this.input.keyboard.on('keydown-ENTER', back);
        this.input.keyboard.on('keydown-SPACE', back);
        this.input.on('pointerdown', back);
      });
      this.input.keyboard.on('keydown-M', () => { this.sound.mute = !this.sound.mute; });
    }

    confetti() {
      const p = this.add.particles(GAME_W / 2, -20, 'conf', {
        x: { min: 0, max: GAME_W }, y: -10,
        speedY: { min: 120, max: 260 }, speedX: { min: -60, max: 60 },
        scale: { min: 0.6, max: 1.4 }, lifespan: 3500, frequency: 40,
        gravityY: 60, rotate: { min: 0, max: 360 },
        tint: [0xffd54a, 0x54e08a, 0x5ab0ff, 0xff5a6e, 0xffffff],
      }).setDepth(5);
      this.time.delayedCall(2600, () => p.stop());
    }

    spawnRankParticles(x, y, color) {
      const p = this.add.particles(x, y, 'spark', {
        speed: { min: 60, max: 220 }, angle: { min: 0, max: 360 },
        scale: { start: 0.9, end: 0 }, lifespan: { min: 500, max: 900 },
        quantity: 40, blendMode: 'ADD', tint: color, emitting: false,
      }).setDepth(30);
      p.explode(40);
      this.time.delayedCall(1000, () => p.destroy());
    }
  }

  // Health/MP bar with a delayed "damage trail".
  class Bar {
    constructor(scene, x, y, w, h, max, color, isEnemy) {
      this.scene = scene; this.x = x; this.y = y; this.w = w; this.h = h;
      this.max = max; this.cur = max; this.color = color;
      this.bg = scene.add.rectangle(x, y, w, h, 0x10101c).setOrigin(0, 0.5)
        .setStrokeStyle(2, 0x000000).setDepth(49);
      this.trail = scene.add.rectangle(x, y, w, h, isEnemy ? 0xff8888 : 0xffffff)
        .setOrigin(0, 0.5).setDepth(49).setAlpha(0.5);
      this.fill = scene.add.rectangle(x, y, w, h, color).setOrigin(0, 0.5).setDepth(50);
    }
    set(v, animate = true) {
      v = Math.max(0, Math.min(this.max, v));
      this.cur = v;
      const target = this.w * (v / this.max);
      if (animate) {
        this.scene.tweens.add({ targets: this.fill, width: target, duration: 280, ease: 'Quad.out' });
        this.scene.tweens.add({ targets: this.trail, width: target, duration: 600, delay: 180, ease: 'Quad.out' });
      } else {
        this.fill.width = target; this.trail.width = target;
      }
    }
  }

  // Scale an image to COVER a target rect (like CSS background-size: cover).
  function fitCover(img, w, h) {
    const s = Math.max(w / img.width, h / img.height);
    img.setScale(s);
  }

  // BGM management via registry (one looping track at a time).
  function playBgm(scene, key, vol) {
    try {
      if (!scene.cache.audio.exists(key)) return; // asset failed/missing — skip silently
      const curKey = scene.registry.get('bgmKey');
      const cur = scene.registry.get('bgmObj');
      if (curKey === key && cur && cur.isPlaying) return;
      if (cur) { try { cur.stop(); cur.destroy(); } catch (e) {} }
      const m = scene.sound.add(key, { loop: true, volume: vol == null ? 0.35 : vol });
      m.play();
      scene.registry.set('bgmObj', m);
      scene.registry.set('bgmKey', key);
    } catch (e) {}
  }
  // Load a BGM on demand (if not already cached) then play it. Never blocks the boot.
  function lazyBgm(scene, key, vol) {
    try {
      if (scene.cache.audio.exists(key)) { playBgm(scene, key, vol); return; }
      scene.registry.set('bgmPending', key); // intent marker (survives scene changes)
      scene.load.once('filecomplete-audio-' + key, () => {
        if (scene.scene.isActive() && scene.registry.get('bgmPending') === key) playBgm(scene, key, vol);
      });
      scene.load.audio(key, 'music/' + key + '.mp3');
      scene.load.start();
    } catch (e) {}
  }
  function stopBgm(scene) {
    const cur = scene.registry.get('bgmObj');
    if (cur) { try { cur.stop(); cur.destroy(); } catch (e) {} }
    scene.registry.set('bgmObj', null);
    scene.registry.set('bgmKey', null);
  }
  function sfx(scene, key, vol) {
    try { scene.sound.play(key, { volume: vol == null ? 0.5 : vol }); } catch (e) {}
  }

  /* =====================================================================
     Launch
     ===================================================================== */
  const config = {
    type: Phaser.AUTO,
    width: GAME_W, height: GAME_H,
    parent: 'game-root',
    backgroundColor: '#05050a',
    pixelArt: true,
    roundPixels: true,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    // Abort stalled asset requests so a hung connection can't freeze the loader forever.
    loader: { timeout: 30000 },
    scene: [BootScene, TitleScene, TutorialScene, SelectScene, BattleScene, EndingScene, ResultScene],
  };
  window.game = new Phaser.Game(config);
  </script>
</body>
</html>
