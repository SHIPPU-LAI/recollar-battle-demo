  /* =====================================================================
     SELECT (アビリティ・スキル選択)
     ===================================================================== */
  const SKILL_POOL = [
    { key: 'heavy',   label: 'ヘヴィースラッシュ', sub: '−12MP  大ダメージ',         icon: '⚔', mp: 12 },
    { key: 'holy',    label: 'ホーリー・レイン',   sub: '−14MP  ダメージ+HP回復',    icon: '✚', mp: 14 },
    { key: 'night',   label: 'ロード・オブ・ナイト', sub: '−12MP  ダメージ+HP吸収',  icon: '☾', mp: 12 },
    { key: 'counter', label: 'カウンタースタンス',  sub: '−12MP  次撃を完全防御',   icon: '◈', mp: 12 },
    { key: 'charge',  label: '溜め斬り',           sub: '−10MP  詠唱→次T大ダメージ', icon: '▲', mp: 10 },
  ];

  class SelectScene extends Phaser.Scene {
    constructor() { super('Select'); }
    init(data) {
      this.battleData = data;
      this.abilityParry = true;           // パリィからの反撃
      this.selectedSkills = new Set(['heavy','holy','night']); // default 3
    }

    create() {
      const W = GAME_W, H = GAME_H;
      const bg = this.add.image(W/2, H/2, 'stage3'); fitCover(bg, W, H); bg.setTint(0x44446a);
      this.add.rectangle(W/2, H/2, W, H, 0x05050f, 0.60);

      this.add.text(W/2, 42, 'A B I L I T Y   S E L E C T', { fontFamily: FONT, fontSize: '13px', color: C.gold }).setOrigin(0.5);
      this.add.text(W/2, 72, '出撃前の準備', { fontFamily: FONT, fontSize: '30px', color: C.white, fontStyle: 'bold', stroke: C.ink, strokeThickness: 6 }).setOrigin(0.5);

      // ---- LEFT: アビリティ ----
      this.add.text(180, 118, 'アビリティ', { fontFamily: FONT, fontSize: '15px', color: '#c89bff', fontStyle: 'bold' }).setOrigin(0.5);
      this.add.rectangle(180, 118, 290, 2, 0xc89bff, 0.5).setOrigin(0.5, 0).setY(130);

      const ab = { key:'parry', label:'パリィからの反撃', desc:'パリィ成功後に追撃タイミング\n入力ウィンドウが開く', icon:'⚡' };
      const abY = 200;
      this._abBox = this.add.rectangle(180, abY, 290, 80, 0x1a2a1a, 0.92).setStrokeStyle(2, C.greenN).setInteractive();
      this.add.text(60, abY - 18, ab.icon, { fontSize: '26px' });
      this.add.text(90, abY - 16, ab.label, { fontFamily: FONT, fontSize: '14px', color: C.white, fontStyle: 'bold' });
      this.add.text(90, abY + 4,  ab.desc,  { fontFamily: FONT, fontSize: '11px', color: '#9a9ac0' });
      this._abTog = this.add.text(290, abY, 'ON', { fontFamily: FONT, fontSize: '20px', color: C.green, fontStyle: 'bold' }).setOrigin(0.5);

      this._abBox.on('pointerdown', () => {
        this.abilityParry = !this.abilityParry;
        const on = this.abilityParry;
        this._abBox.setStrokeStyle(2, on ? C.greenN : 0x44446a);
        this._abBox.setFillStyle(on ? 0x1a2a1a : 0x12121f, 0.92);
        this._abTog.setText(on ? 'ON' : 'OFF').setColor(on ? C.green : '#7a6a6a');
        sfx(this, 'se_draw', 0.25);
      });

      // hint
      this.add.text(180, 270, '「パリィからの反撃」：パリィ後、追加のタイミング入力でカウンターダメージ。', { fontFamily: FONT, fontSize: '11px', color: '#7a7aaa', wordWrap: { width: 280 } }).setOrigin(0.5);

      // Tutorial link
      const tutBtn = this.add.text(180, 430, '? チュートリアルを見る', { fontFamily: FONT, fontSize: '14px', color: '#9a9ac0', fontStyle: 'bold' }).setOrigin(0.5).setInteractive();
      tutBtn.on('pointerdown', () => { sfx(this, 'se_draw', 0.3); this.scene.start('Tutorial', this.battleData); });
      tutBtn.on('pointerover', () => tutBtn.setColor(C.white));
      tutBtn.on('pointerout', () => tutBtn.setColor('#9a9ac0'));

      // ---- RIGHT: スキル選択 ----
      this.add.text(700, 118, 'スキル選択  (3つ選ぶ)', { fontFamily: FONT, fontSize: '15px', color: '#5ab0ff', fontStyle: 'bold' }).setOrigin(0.5);
      this.add.rectangle(700, 118, 380, 2, 0x5ab0ff, 0.5).setOrigin(0.5, 0).setY(130);

      this._skillBoxes = [];
      SKILL_POOL.forEach((sk, i) => {
        const sy = 175 + i * 68;
        const sel = this.selectedSkills.has(sk.key);
        const box = this.add.rectangle(700, sy, 370, 58, sel ? 0x12201e : 0x12121f, 0.92)
          .setStrokeStyle(2, sel ? C.greenN : 0x44446a).setInteractive();
        this.add.text(525, sy, sk.icon, { fontSize: '22px' }).setOrigin(0, 0.5);
        this.add.text(556, sy - 10, sk.label, { fontFamily: FONT, fontSize: '13px', color: C.white, fontStyle: 'bold' });
        this.add.text(556, sy + 10, sk.sub,   { fontFamily: FONT, fontSize: '11px', color: '#9a9ac0' });
        const chk = this.add.text(862, sy, sel ? '☑' : '☐', { fontFamily: FONT, fontSize: '22px', color: sel ? C.green : '#7a7a9a' }).setOrigin(0.5);
        this._skillBoxes.push({ box, chk, key: sk.key });

        box.on('pointerdown', () => {
          if (this.selectedSkills.has(sk.key)) {
            if (this.selectedSkills.size <= 1) { sfx(this, 'se_hit', 0.2); return; }
            this.selectedSkills.delete(sk.key);
            box.setStrokeStyle(2, 0x44446a); box.setFillStyle(0x12121f, 0.92);
            chk.setText('☐').setColor('#7a7a9a');
          } else {
            if (this.selectedSkills.size >= 3) { sfx(this, 'se_hit', 0.2); this.flashWarn('最大3つまで選択できます'); return; }
            this.selectedSkills.add(sk.key);
            box.setStrokeStyle(2, C.greenN); box.setFillStyle(0x12201e, 0.92);
            chk.setText('☑').setColor(C.green);
          }
          sfx(this, 'se_draw', 0.25);
          this.updateCountLabel();
        });
        box.on('pointerover', () => box.setStrokeStyle(3, C.goldN));
        box.on('pointerout', () => box.setStrokeStyle(2, this.selectedSkills.has(sk.key) ? C.greenN : 0x44446a));
      });
      this._countLabel = this.add.text(700, 455, '', { fontFamily: FONT, fontSize: '12px', color: '#9a9ac0' }).setOrigin(0.5);
      this.updateCountLabel();

      // ---- divider ----
      this.add.rectangle(480, H/2, 2, 320, 0x33335a, 0.8);

      // ---- START button ----
      const startBtn = this.add.text(W/2, H - 42, '▶  ENTER / CLICK  ―  バトル開始', {
        fontFamily: FONT, fontSize: '22px', color: C.white, fontStyle: 'bold', stroke: C.ink, strokeThickness: 5,
      }).setOrigin(0.5).setInteractive();
      this.tweens.add({ targets: startBtn, alpha: { from:1, to:0.3 }, duration: 700, yoyo: true, repeat: -1 });
      startBtn.on('pointerdown', () => this.startBattle());
      this.input.keyboard.on('keydown-ENTER', () => this.startBattle());
      this.input.keyboard.on('keydown-M', () => { this.sound.mute = !this.sound.mute; });

      this.cameras.main.fadeIn(400, 0, 0, 0);
      sfx(this, 'se_draw', 0.35);
    }

    updateCountLabel() {
      this._countLabel.setText('選択中: ' + this.selectedSkills.size + ' / 3');
    }

    flashWarn(text) {
      const t = this.add.text(GAME_W/2, GAME_H/2, text, {
        fontFamily: FONT, fontSize: '18px', color: C.red, fontStyle: 'bold', stroke: C.ink, strokeThickness: 5,
      }).setOrigin(0.5).setDepth(200);
      this.tweens.add({ targets: t, alpha: 0, y: '-=20', duration: 900, onComplete: () => t.destroy() });
    }

    startBattle() {
      if (this._started) return; this._started = true;
      sfx(this, 'se_draw', 0.55);
      this.cameras.main.fadeOut(400, 0, 0, 0);
      this.cameras.main.once('camerafadeoutcomplete', () => {
        this.scene.start('Battle', {
          ...this.battleData,
          abilityParry: this.abilityParry,
          selectedSkills: [...this.selectedSkills],
        });
      });
    }
  }

  /* =====================================================================
     BATTLE
     ===================================================================== */
  class BattleScene extends Phaser.Scene {
    constructor() { super('Battle'); }

    init(data) {
      this.encIndex = data.index || 0;
      this.enc = ENCOUNTERS[this.encIndex];
      this.player = {
        maxHp: PLAYER_BASE.maxHp, hp: data.hp,
        maxMp: PLAYER_BASE.maxMp, mp: data.mp,
        maxSp: PLAYER_BASE.maxSp, sp: data.sp || 0,
      };
      this.party = ['shizu', 'noel'];
      this.waveIndex = 0;
      const w = this.enc.waves[0];
      this.enemy = { maxHp: w.hp, hp: w.hp };
      this.stats = data.stats || { turns: 0, perfect: 0, maxCombo: 0 };
      this.combo = 0;
      this.guarding = false;
      this.counterStance = false; // カウンタースタンス (absorb next hit)
      this.chargeReady = false;   // 溜め斬り: fires at start of next turn
      this.voiceShown = {};       // boss voice line thresholds already triggered
      this.enemyTurnCount = 0;
      this.phase = 1;
      this.casting = false;
      this.phase2Pending = false;
      this.state = 'INIT';
      this.timing = null;
      // Ability / skill loadout from SelectScene
      this.abilityParry = data.abilityParry !== false; // パリィからの反撃 (default ON)
      this.selectedSkills = data.selectedSkills || ['heavy','holy','night'];
      // Cutin tracking (first ally action shows dramatic cutin)
      this.firstAllyActDone = data.firstAllyActDone || { shizu: false, noel: false };
    }

    curWave() { return this.enc.waves[this.waveIndex]; }
    hasAlly(key) { return this.party.indexOf(key) !== -1; }

    enemyDisplayName() {
      const multi = this.enc.waves.length > 1;
      return this.enc.name + (multi ? '  (' + (this.waveIndex + 1) + ' / ' + this.enc.waves.length + ')' : '');
    }

    // ---- Companions ------------------------------------------------
    makeAlly(key, x, y) {
      const c = COMPANIONS[key];
      const cont = this.add.container(x, y).setDepth(8).setAlpha(0.95);
      const ring = this.add.circle(0, 0, 23, c.color, 0.92).setStrokeStyle(3, 0x10101c);
      const init = this.add.text(0, -1, c.initial, { fontFamily: FONT, fontSize: '22px', color: '#16121c', fontStyle: 'bold' }).setOrigin(0.5);
      const nm = this.add.text(0, 30, c.name, { fontFamily: FONT, fontSize: '11px', color: '#e6e6f4', fontStyle: 'bold', stroke: C.ink, strokeThickness: 3 }).setOrigin(0.5);
      cont.add([ring, init, nm]);
      this.tweens.add({ targets: cont, y: y - 4, duration: 1600 + Math.random() * 500, yoyo: true, repeat: -1, ease: 'Sine.inOut' });
      return { key, cont, ring, x, y };
    }

    allyAct(key, text) {
      const a = this.allies.find(x => x.key === key);
      if (!a) return;
      if (!this.firstAllyActDone[key]) {
        this.firstAllyActDone[key] = true;
        this.showAllyCutin(key, text);
        return;
      }
      this._allyBubble(key, text);
    }

    _allyBubble(key, text) {
      const a = this.allies.find(x => x.key === key);
      if (!a) return;
      this.tweens.add({ targets: a.cont, scaleX: { from: 1.3, to: 1 }, scaleY: { from: 1.3, to: 1 }, duration: 320, ease: 'Back.out' });
      const t = this.add.text(a.x + 34, a.y - 26, COMPANIONS[key].name + '：' + text, {
        fontFamily: FONT, fontSize: '13px', color: '#ffe6a0', fontStyle: 'bold', stroke: C.ink, strokeThickness: 4,
      }).setOrigin(0, 0.5).setDepth(110);
      this.tweens.add({ targets: t, x: '+=10', alpha: { from: 1, to: 0 }, delay: 500, duration: 500, onComplete: () => t.destroy() });
    }

    showAllyCutin(key, text) {
      const c = COMPANIONS[key];
      const W = GAME_W, H = GAME_H;

      // Dark overlay (non-blocking — game flow continues, cutin is foreground FX)
      const overlay = this.add.rectangle(W/2, H/2, W, H, 0x000000, 0).setDepth(190);
      this.tweens.add({ targets: overlay, alpha: 0.78, duration: 200 });

      // Diagonal slash lines for drama
      const line1 = this.add.rectangle(W/2, H/2 - 60, W * 1.4, 3, 0xffffff, 0.18).setDepth(191).setAngle(-15);
      const line2 = this.add.rectangle(W/2, H/2 + 60, W * 1.4, 3, 0xffffff, 0.12).setDepth(191).setAngle(-15);

      // Large companion circle (center-left)
      const cx = W/2 - 90, cy = H/2;
      const ring = this.add.circle(cx, cy, 4, c.color, 0.95).setDepth(192).setStrokeStyle(5, 0xffffff);
      this.tweens.add({ targets: ring, radius: 72, duration: 260, ease: 'Back.out' });
      const initT = this.add.text(cx, cy - 2, c.initial, {
        fontFamily: FONT, fontSize: '68px', color: '#10100c', fontStyle: 'bold',
      }).setOrigin(0.5).setDepth(193).setAlpha(0);
      this.tweens.add({ targets: initT, alpha: 1, duration: 180, delay: 180 });

      // Name & role (slides in from right)
      const nameT = this.add.text(cx + 140, cy - 22, c.name, {
        fontFamily: FONT, fontSize: '40px', color: C.white, fontStyle: 'bold',
        stroke: C.ink, strokeThickness: 8,
      }).setOrigin(0, 0.5).setDepth(193).setAlpha(0).setX(cx + 170);
      this.tweens.add({ targets: nameT, alpha: 1, x: cx + 140, duration: 240, delay: 140 });

      const roleColor = '#' + c.color.toString(16).padStart(6, '0');
      const roleT = this.add.text(cx + 140, cy + 18, c.role, {
        fontFamily: FONT, fontSize: '17px', color: roleColor, fontStyle: 'bold',
      }).setOrigin(0, 0.5).setDepth(193).setAlpha(0);
      this.tweens.add({ targets: roleT, alpha: 1, duration: 220, delay: 240 });

      const actT = this.add.text(cx + 140, cy + 50, '「' + text + '」', {
        fontFamily: FONT, fontSize: '16px', color: '#ffe6a0',
      }).setOrigin(0, 0.5).setDepth(193).setAlpha(0);
      this.tweens.add({ targets: actT, alpha: 1, duration: 200, delay: 320 });

      sfx(this, 'se_draw', 0.55);

      const objs = [overlay, line1, line2, ring, initT, nameT, roleT, actT];
      this.time.delayedCall(1500, () => {
        this.tweens.add({
          targets: objs, alpha: 0, duration: 280,
          onComplete: () => { objs.forEach(o => o.destroy()); this._allyBubble(key, text); },
        });
      });
    }

    // シズ：パーフェクトコンボ後の追撃射撃
    shizuFollowUp() {
      const a = this.allies.find(x => x.key === 'shizu');
      if (!a) { this.afterPlayerAction(); return; }
      this.allyAct('shizu', '追撃射撃！');
      sfx(this, 'se_hit', 0.45);
      const bullet = this.add.rectangle(a.x + 22, a.y, 16, 4, 0xffe6a0).setDepth(24).setBlendMode(Phaser.BlendModes.ADD);
      this.tweens.add({
        targets: bullet, x: this.enemySprite.x, y: this.enemySprite.y - 60, duration: 220, ease: 'Quad.in',
        onComplete: () => {
          bullet.destroy();
          sfx(this, 'se_explosion', 0.3);
          this.spawnSpark(this.enemySprite.x, this.enemySprite.y - 60, 0xffe6a0, 14);
          this.cameras.main.shake(140, 0.007);
          this.dealToEnemy(28, 'GOOD');
          this.time.delayedCall(520, () => this.afterPlayerAction());
        },
      });
    }

    create() {
      const W = GAME_W, H = GAME_H;

      // --- Background ---
      const bg = this.add.image(W / 2, H / 2, this.enc.bg);
      fitCover(bg, W, H); bg.setDepth(0);
      this.bgImage = bg;
      this.add.rectangle(W / 2, H / 2, W, H, 0x05050f, 0.18).setDepth(0);
      // Phase-2 dark overlay (initially invisible, fades in on 第二形態)
      this.darkBgOverlay = this.add.rectangle(W/2, H/2, W, H, 0x0a0020, 0).setDepth(1);
      // ground shadow band
      this.add.rectangle(W / 2, GROUND_Y + 8, W, 60, 0x000000, 0.28).setDepth(1);

      // --- Characters ---
      this.aliciaShadow = this.add.ellipse(250, GROUND_Y + 10, 110, 26, 0x000000, 0.35).setDepth(5);
      this.alicia = this.add.sprite(250, GROUND_Y + 12, 'main')
        .setOrigin(0.5, 1).setScale(2.4).setDepth(10);
      // Return to the resting frame once an attack flourish finishes.
      this.alicia.on('animationcomplete', () => { if (this.alicia.active) this.alicia.setTexture('main'); });
      this.aliciaIdle = this.tweens.add({
        targets: [this.alicia], y: GROUND_Y + 12 - 6, duration: 1500,
        yoyo: true, repeat: -1, ease: 'Sine.inOut',
      });

      const ex = 710, ey = GROUND_Y + 12 + this.enc.yOff;
      this.enemyShadow = this.add.ellipse(ex, GROUND_Y + 10, 120, 28, 0x000000, 0.35).setDepth(5);
      this.enemySprite = this.add.sprite(ex, ey, this.enc.texture)
        .setOrigin(0.5, 1).setScale(this.enc.scale).setDepth(10).setFlipX(false);
      if (this.enc.idleAnim) this.enemySprite.play(this.enc.idleAnim);
      this.enemyIdle = this.tweens.add({
        targets: [this.enemySprite], y: ey - 8, duration: 1800,
        yoyo: true, repeat: -1, ease: 'Sine.inOut',
      });
      this.enemyHome = { x: ex, y: ey };
      this.aliciaHome = { x: 250, y: GROUND_Y + 12 };

      // Waiting 2nd enemy (for multi-wave encounters like 過去の幻影×2): a faded figure behind.
      if (this.enc.waves.length > 1) {
        this.waitingSprite = this.add.sprite(ex + 120, ey - 10, this.enc.texture)
          .setOrigin(0.5, 1).setScale(this.enc.scale * 0.9).setDepth(7)
          .setAlpha(0.4).setTint(0x6a6a88).setFlipX(false);
        this.tweens.add({ targets: this.waitingSprite, y: ey - 18, duration: 2100, yoyo: true, repeat: -1, ease: 'Sine.inOut' });
      }

      // --- Companions (back line, placeholder avatars — art TBD) ---
      this.allies = [];
      if (this.hasAlly('shizu')) this.allies.push(this.makeAlly('shizu', 150, 244));
      if (this.hasAlly('noel')) this.allies.push(this.makeAlly('noel', 86, 286));

      // --- Enemy UI (top) ---
      this.enemyNameText = this.add.text(W / 2, 40, this.enemyDisplayName(), {
        fontFamily: FONT, fontSize: '22px', color: C.white, fontStyle: 'bold',
        stroke: C.ink, strokeThickness: 5,
      }).setOrigin(0.5).setDepth(50);
      this.add.text(W / 2, 64, this.enc.tag, {
        fontFamily: FONT, fontSize: '11px', color: C.red, fontStyle: 'bold',
      }).setOrigin(0.5).setDepth(50);
      this.enemyBar = new Bar(this, W / 2 - 230, 84, 460, 16, this.enemy.maxHp, C.redN, true);
      // encounter pips
      const pipText = (this.encIndex + 1) + ' / ' + ENCOUNTERS.length;
      this.add.text(W - 16, 20, 'BATTLE ' + pipText, {
        fontFamily: FONT, fontSize: '12px', color: '#9a9ac0', fontStyle: 'bold',
      }).setOrigin(1, 0).setDepth(50);

      // --- Player UI (bottom-left) ---
      const px = 24, py = 436;
      this.add.rectangle(px - 12, py - 12, 292, 104, 0x0a0a18, 0.66)
        .setOrigin(0, 0).setStrokeStyle(2, 0x33335a).setDepth(48);
      this.add.text(px, py, 'エリシア', {
        fontFamily: FONT, fontSize: '19px', color: C.white, fontStyle: 'bold',
      }).setOrigin(0, 0).setDepth(50);
      this.add.text(px + 92, py + 4, 'ELYSIA', {
        fontFamily: FONT, fontSize: '10px', color: '#9a9ac0',
      }).setOrigin(0, 0).setDepth(50);
      // HP
      this.add.text(px, py + 27, 'HP', { fontFamily: FONT, fontSize: '11px', color: C.green, fontStyle: 'bold' }).setDepth(50);
      this.hpBar = new Bar(this, px + 28, py + 34, 196, 12, this.player.maxHp, C.greenN);
      this.hpText = this.add.text(px + 250, py + 27, '', { fontFamily: FONT, fontSize: '11px', color: '#cfcfe6' }).setOrigin(1, 0).setDepth(50);
      // MP
      this.add.text(px, py + 46, 'MP', { fontFamily: FONT, fontSize: '11px', color: C.blue, fontStyle: 'bold' }).setDepth(50);
      this.mpBar = new Bar(this, px + 28, py + 52, 196, 9, this.player.maxMp, C.blueN);
      this.mpText = this.add.text(px + 250, py + 46, '', { fontFamily: FONT, fontSize: '11px', color: '#cfcfe6' }).setOrigin(1, 0).setDepth(50);
      // OVERDRIVE / SP
      this.add.text(px, py + 64, 'OD', { fontFamily: FONT, fontSize: '11px', color: '#c89bff', fontStyle: 'bold' }).setDepth(50);
      this.spBar = new Bar(this, px + 28, py + 70, 196, 9, this.player.maxSp, 0xb366ff);
      this.spReadyText = this.add.text(px + 250, py + 64, 'READY!', { fontFamily: FONT, fontSize: '11px', color: C.gold, fontStyle: 'bold' }).setOrigin(1, 0).setDepth(50).setVisible(false);
      this.tweens.add({ targets: this.spReadyText, alpha: { from: 1, to: 0.3 }, duration: 450, yoyo: true, repeat: -1 });
      this.refreshStatsUI(false);

      // --- Combo counter ---
      this.comboText = this.add.text(W / 2, 150, '', {
        fontFamily: FONT, fontSize: '34px', color: C.gold, fontStyle: 'bold',
        stroke: C.ink, strokeThickness: 6,
      }).setOrigin(0.5).setDepth(60).setAlpha(0);

      // --- Command menu ---
      this.buildCommandMenu();

      // --- Message banner ---
      this.banner = this.add.text(W / 2, 250, '', {
        fontFamily: FONT, fontSize: '30px', color: C.white, fontStyle: 'bold',
        stroke: C.ink, strokeThickness: 6, align: 'center',
      }).setOrigin(0.5).setDepth(120).setAlpha(0);

      // --- Timing UI container (built lazily) ---
      this.timingLayer = this.add.container(0, 0).setDepth(70);

      // --- Full-screen flash + rage vignette ---
      this.flashRect = this.add.rectangle(W / 2, H / 2, W, H, 0xffffff, 0)
        .setDepth(180).setBlendMode(Phaser.BlendModes.ADD);
      this.rageVignette = this.add.rectangle(W / 2, H / 2, W, H, 0xff2030, 0)
        .setDepth(9).setBlendMode(Phaser.BlendModes.ADD);

      // --- Input ---
      this.input.keyboard.on('keydown-LEFT', () => this.moveCursor(-1));
      this.input.keyboard.on('keydown-RIGHT', () => this.moveCursor(1));
      this.input.keyboard.on('keydown-UP', () => this.moveCursor(-1));
      this.input.keyboard.on('keydown-DOWN', () => this.moveCursor(1));
      this.input.keyboard.on('keydown-SPACE', () => this.onActionKey());
      this.input.keyboard.on('keydown-ENTER', () => this.onActionKey());
      this.input.keyboard.on('keydown-M', () => { this.sound.mute = !this.sound.mute; });

      // Music (all BGM lazy-loaded per scene)
      lazyBgm(this, this.enc.bgm, this.enc.id === 'demon' ? 0.42 : 0.32);
      if (this.enc.id === 'demon' && !this.cache.audio.exists('bgm_unleash')) {
        this.load.audio('bgm_unleash', 'music/bgm_unleash.mp3'); // pre-fetch phase-2 theme
        this.load.start();
      }
      this.cameras.main.fadeIn(450, 0, 0, 0);

      // Boss rage state
      this.raging = false;

      // --- Damage log panel (right side) ---
      const logX = GAME_W - 6, logY = 108;
      this.add.rectangle(logX - 82, logY + 63, 160, 148, 0x060614, 0.70)
        .setStrokeStyle(1, 0x2a2a50).setDepth(48).setOrigin(1, 0);
      this.add.text(logX - 12, logY + 4, 'LOG', {
        fontFamily: FONT, fontSize: '10px', color: '#4a4a6a', fontStyle: 'bold',
      }).setOrigin(1, 0).setDepth(50);
      this._logLines = [];
      for (let i = 0; i < 5; i++) {
        this._logLines.push(
          this.add.text(logX - 12, logY + 22 + i * 24, '', {
            fontFamily: FONT, fontSize: '11px', color: '#6a6a90',
          }).setOrigin(1, 0).setDepth(50)
        );
      }
      this._logEntries = [];

      // Intro
      this.time.delayedCall(300, () => this.introBanner());
    }

    // ---- Intro VS banner -------------------------------------------
    introBanner() {
      this.state = 'BANNER';
      sfx(this, 'se_slowmo', 0.5);
      const afterBanner = () => {
        if (this.encIndex === 0 && this.allies.length) {
          this.allies.forEach(a => this.tweens.add({ targets: a.cont, scaleX: { from: 1.3, to: 1 }, scaleY: { from: 1.3, to: 1 }, duration: 350, ease: 'Back.out' }));
          this.flashBanner('仲間 シズ・ノエル が 援護する！', '#ffe6a0');
          this.time.delayedCall(700, () => this.startPlayerTurn());
        } else {
          this.startPlayerTurn();
        }
      };
      if (this.enc.bossIntro) {
        this.showBossIntroCutin(() => {
          this.showBanner(this.enc.flavor + '\n' + this.enc.name, 900, afterBanner);
        });
      } else {
        this.showBanner(this.enc.flavor + '\n' + this.enc.name, 1100, afterBanner);
      }
    }

    showBossIntroCutin(cb) {
      const W = GAME_W, H = GAME_H;
      // Black cinematic bars
      const topBar = this.add.rectangle(W / 2, 0, W, 110, 0x000000).setDepth(200).setOrigin(0.5, 1).setY(-55);
      const botBar = this.add.rectangle(W / 2, H, W, 110, 0x000000).setDepth(200).setOrigin(0.5, 0).setY(H + 55);
      this.tweens.add({ targets: topBar, y: 55, duration: 350, ease: 'Quad.out' });
      this.tweens.add({ targets: botBar, y: H - 55, duration: 350, ease: 'Quad.out' });

      // Enemy portrait slides in from right
      const portrait = this.add.sprite(W + 240, H / 2 - 20, this.enc.texture)
        .setOrigin(0.5, 1).setScale(this.enc.scale * 1.9).setDepth(201).setAlpha(0.92)
        .setY(H - 55 + (this.enc.yOff || 0) * this.enc.scale * 1.9);
      if (this.enc.idleAnim) portrait.play(this.enc.idleAnim);
      this.tweens.add({ targets: portrait, x: W * 0.68, duration: 480, ease: 'Quad.out', delay: 80 });

      // Accent lines
      const lineTop = this.add.rectangle(W / 2, 110, W, 2, 0xcc3344, 0.8).setDepth(201).setAlpha(0);
      const lineBt  = this.add.rectangle(W / 2, H - 110, W, 2, 0xcc3344, 0.8).setDepth(201).setAlpha(0);
      this.tweens.add({ targets: [lineTop, lineBt], alpha: 1, duration: 200, delay: 280 });

      // Name slides in from left
      const nameT = this.add.text(-320, H / 2 - 36, this.enc.name, {
        fontFamily: FONT, fontSize: '50px', color: '#ffffff', fontStyle: 'bold',
        stroke: C.ink, strokeThickness: 10,
      }).setDepth(202).setOrigin(0, 0.5);
      this.tweens.add({ targets: nameT, x: 58, duration: 420, ease: 'Quad.out', delay: 120 });

      const tagT = this.add.text(-320, H / 2 + 22, '― ' + this.enc.tag + ' ―', {
        fontFamily: FONT, fontSize: '15px', color: C.red, fontStyle: 'bold',
      }).setDepth(202).setOrigin(0, 0.5);
      this.tweens.add({ targets: tagT, x: 62, duration: 420, ease: 'Quad.out', delay: 200 });

      sfx(this, 'se_slash', 0.55);
      this.flash(0xffffff, 0.45, 200);

      const all = [topBar, botBar, lineTop, lineBt, nameT, tagT, portrait];
      this.time.delayedCall(1700, () => {
        this.tweens.add({
          targets: all, alpha: 0, duration: 380, ease: 'Quad.in',
          onComplete: () => { all.forEach(o => o.destroy()); if (cb) cb(); },
        });
      });
    }

    // ---- Command menu ----------------------------------------------
    buildCommandMenu() {
      const cmds = [
        { key: 'attack',  label: 'こうげき', sub: 'ATTACK', icon: '⚔' },
        { key: 'skill',   label: 'スキル',   sub: 'SKILL', icon: '✦' },
        { key: 'guard',   label: 'ぼうぎょ', sub: 'GUARD +MP', icon: '🛡' },
        { key: 'special', label: 'ひっさつ', sub: 'OVERDRIVE', icon: '★' },
      ];
      // Skill sub-menu — filtered to player's selected loadout + back button.
      const ALL_SKILLS = [
        { key: 'heavy',   label: 'ヘヴィースラッシュ', sub: '−12MP 大ダメージ',    icon: '⚔', mp: 12 },
        { key: 'holy',    label: 'ホーリー・レイン',   sub: '−14MP HP回復',       icon: '✚', mp: 14 },
        { key: 'night',   label: 'ロード・オブ・ナイト', sub: '−12MP HP吸収',     icon: '☾', mp: 12 },
        { key: 'counter', label: 'カウンタースタンス',  sub: '−12MP 次撃を完全防御', icon: '◈', mp: 12 },
      ];
      const skills = ALL_SKILLS.filter(s => this.selectedSkills.includes(s.key))
        .concat([{ key: 'back', label: 'もどる', sub: 'CANCEL', icon: '◀', mp: 0 }]);
      this.cmdButtons = this.makeButtonRow(cmds, 'cmd');
      this.skillButtons = this.makeButtonRow(skills, 'skill');
      this.cmdIndex = 0;
      this.skillIndex = 0;
      this.setMenuVisible(false);
      this.skillButtons.forEach(b => b.cont.setVisible(false));
    }

    makeButtonRow(defs, kind) {
      const bw = 160, gap = 6, firstX = 300 + bw / 2, y = 508;
      const arr = [];
      defs.forEach((d, i) => {
        const x = firstX + i * (bw + gap);
        const cont = this.add.container(x, y).setDepth(55);
        const box = this.add.rectangle(0, 0, bw, 54, 0x12121f, 0.92).setStrokeStyle(2, 0x44446a);
        const ic = this.add.text(-bw / 2 + 18, 0, d.icon, { fontSize: '18px' }).setOrigin(0.5);
        const lab = this.add.text(-bw / 2 + 34, -8, d.label, {
          fontFamily: FONT, fontSize: kind === 'skill' ? '12px' : '16px', color: C.white, fontStyle: 'bold',
        }).setOrigin(0, 0.5);
        const sub = this.add.text(-bw / 2 + 34, 12, d.sub, {
          fontFamily: FONT, fontSize: '9px', color: '#9a9ac0',
        }).setOrigin(0, 0.5);
        cont.add([box, ic, lab, sub]);
        cont.setSize(bw, 54);
        cont.setInteractive(new Phaser.Geom.Rectangle(-bw / 2, -27, bw, 54), Phaser.Geom.Rectangle.Contains);
        cont.on('pointerover', () => {
          if (kind === 'cmd' && this.state === 'COMMAND') { this.cmdIndex = i; this.refreshCmd(); }
          else if (kind === 'skill' && this.state === 'SKILLMENU') { this.skillIndex = i; this.refreshSkill(); }
        });
        cont.on('pointerdown', () => {
          if (kind === 'cmd' && this.state === 'COMMAND') { this.cmdIndex = i; this.refreshCmd(); this.confirmCommand(); }
          else if (kind === 'skill' && this.state === 'SKILLMENU') { this.skillIndex = i; this.refreshSkill(); this.confirmSkill(); }
        });
        arr.push({ cont, box, lab, sub, def: d });
      });
      return arr;
    }

    setMenuVisible(v) {
      this.cmdButtons.forEach(b => { b.cont.setVisible(v); });
      if (v) this.refreshCmd();
    }

    setSkillMenuVisible(v) {
      this.skillButtons.forEach(b => { b.cont.setVisible(v); });
      if (v) this.refreshSkill();
    }

    refreshCmd() {
      this.cmdButtons.forEach((b, i) => {
        const on = i === this.cmdIndex;
        const k = b.def.key;
        let usable = true;
        if (k === 'skill') usable = this.player.mp >= 12;
        if (k === 'special') usable = this.player.sp >= this.player.maxSp;
        const ready = k === 'special' && usable; // overdrive charged & glowing
        b.box.setStrokeStyle(on ? 3 : 2, on ? C.goldN : (ready ? 0xb366ff : 0x44446a));
        b.box.setFillStyle(on ? 0x2a2440 : (ready ? 0x241a3a : 0x12121f), on ? 0.97 : 0.9);
        b.cont.setScale(on ? 1.06 : 1.0);
        b.lab.setColor(!usable ? '#7a6a6a' : (on ? C.gold : (ready ? '#e0b3ff' : C.white)));
        b.box.setAlpha(usable ? 1 : 0.55);
      });
    }

    refreshSkill() {
      this.skillButtons.forEach((b, i) => {
        const on = i === this.skillIndex;
        const usable = b.def.key === 'back' || this.player.mp >= (b.def.mp || 0);
        b.box.setStrokeStyle(on ? 3 : 2, on ? C.goldN : 0x44446a);
        b.box.setFillStyle(on ? 0x2a2440 : 0x12121f, on ? 0.97 : 0.9);
        b.cont.setScale(on ? 1.06 : 1.0);
        b.lab.setColor(!usable ? '#7a6a6a' : (on ? C.gold : C.white));
        b.box.setAlpha(usable ? 1 : 0.55);
      });
    }

    moveCursor(dir) {
      if (this.state === 'COMMAND') {
        this.cmdIndex = (this.cmdIndex + dir + this.cmdButtons.length) % this.cmdButtons.length;
        sfx(this, 'se_draw', 0.25);
        this.refreshCmd();
      } else if (this.state === 'SKILLMENU') {
        this.skillIndex = (this.skillIndex + dir + this.skillButtons.length) % this.skillButtons.length;
        sfx(this, 'se_draw', 0.25);
        this.refreshSkill();
      }
    }

    onActionKey() {
      if (this.state === 'COMMAND') this.confirmCommand();
      else if (this.state === 'SKILLMENU') this.confirmSkill();
      else if (this.state === 'TIMING') this.pressTiming(false);
    }

    // ---- Player turn ------------------------------------------------
    startPlayerTurn() {
      this.stats.turns++;
      this.guarding = false;
      // ノエル passive (再生の祈り): 各ターン開始時に HP を少し回復
      if (this.hasAlly('noel') && this.stats.turns > 1 && this.player.hp > 0 && this.player.hp < this.player.maxHp) {
        const h = Math.min(6, this.player.maxHp - this.player.hp);
        this.player.hp += h;
        this.refreshStatsUI();
        this.allyAct('noel', '再生の祈り');
        this.popText(this.alicia.x + 18, this.alicia.y - 150, '+' + h, C.green, 18);
      }
      // 溜め斬り: auto-release on this turn start
      if (this.chargeReady) {
        this.chargeReady = false;
        this.time.delayedCall(200, () => this.releaseCharge());
        return;
      }
      this.state = 'COMMAND';
      this.setSkillMenuVisible(false);
      this.setMenuVisible(true);
      this.showHint('コマンドを選択');
    }

    releaseCharge() {
      this.state = 'OVER';
      this.setMenuVisible(false);
      sfx(this, 'se_slash', 0.7);
      sfx(this, 'se_magiccircle', 0.5);
      this.showBanner('溜め斬り  発動！', 700, null);
      this.flash(0xffd060, 0.85, 260);
      this.cameras.main.shake(300, 0.014);
      this.hitstop(120);
      this.aliciaIdle.pause();
      this.alicia.play('alicia_attack');
      this.tweens.add({
        targets: this.alicia, x: this.aliciaHome.x + 160, duration: 100, yoyo: true, ease: 'Quad.out',
        onComplete: () => { this.alicia.x = this.aliciaHome.x; this.aliciaIdle.resume(); },
      });
      // Big slash VFX
      for (let k = 0; k < 4; k++) {
        this.time.delayedCall(k * 40, () => {
          this.spawnSlash(
            this.enemySprite.x + Phaser.Math.Between(-30, 30),
            this.enemySprite.y - 70 + Phaser.Math.Between(-20, 10),
            'PERFECT', k, 2.8
          );
        });
      }
      this.chromaHit(7);
      this.time.delayedCall(180, () => {
        // Always PERFECT-tier damage
        this.dealToEnemy(95, 'PERFECT', true);
        this.registerJudge('PERFECT');
        this.time.delayedCall(480, () => this.afterPlayerAction());
      });
    }

    confirmCommand() {
      const def = this.cmdButtons[this.cmdIndex].def;
      if (def.key === 'skill' && this.player.mp < 12) {
        sfx(this, 'se_hit', 0.2);
        this.flashBanner('MPが たりない！', C.red);
        return;
      }
      if (def.key === 'special' && this.player.sp < this.player.maxSp) {
        sfx(this, 'se_hit', 0.2);
        this.flashBanner('オーバードライブ 未充填！', C.red);
        return;
      }
      if (def.key === 'skill') { sfx(this, 'se_draw', 0.4); this.openSkillMenu(); return; }
      this.setMenuVisible(false);
      this.clearHint();
      sfx(this, 'se_draw', 0.5);
      if (def.key === 'attack') this.doAttackCombo();
      else if (def.key === 'special') this.doSpecial();
      else this.doGuard();
    }

    // ---- Skill sub-menu --------------------------------------------
    openSkillMenu() {
      this.state = 'SKILLMENU';
      this.setMenuVisible(false);
      this.skillIndex = 0;
      this.setSkillMenuVisible(true);
      this.showHint('スキルを選択（「もどる」で戻る）');
    }

    closeSkillMenu() {
      this.state = 'COMMAND';
      this.setSkillMenuVisible(false);
      this.setMenuVisible(true);
      this.showHint('コマンドを選択');
    }

    confirmSkill() {
      const def = this.skillButtons[this.skillIndex].def;
      if (def.key === 'back') { sfx(this, 'se_draw', 0.3); this.closeSkillMenu(); return; }
      if (this.player.mp < def.mp) {
        sfx(this, 'se_hit', 0.2);
        this.flashBanner('MPが たりない！', C.red);
        return;
      }
      this.setSkillMenuVisible(false);
      this.clearHint();
      sfx(this, 'se_draw', 0.5);
      this.doSkill(def.key, def.mp);
    }

    // Heal helper (used by skills).
    healPlayer(h) {
      if (h <= 0) return;
      this.player.hp = Math.min(this.player.maxHp, this.player.hp + h);
      this.refreshStatsUI();
      this.popText(this.alicia.x + 20, this.alicia.y - 150, '+' + h + ' HP', C.green, 22);
      this.addLog('エリシア', '+' + h + 'HP', C.green);
    }

    // ---- SKILL execution (timing magic with per-skill effects) -----
    doSkill(key, mpCost) {
      // 溜め斬り — 1ターン詠唱→次ターン自動大ダメージ
      if (key === 'charge') {
        this.player.mp -= mpCost;
        this.refreshStatsUI();
        this.chargeReady = true;
        sfx(this, 'se_draw', 0.55);
        sfx(this, 'se_magiccircle', 0.35);
        // Glow aura on Alicia
        const aura = this.add.circle(this.alicia.x, this.alicia.y - 60, 44, 0xffd060, 0.0)
          .setDepth(18).setBlendMode(Phaser.BlendModes.ADD);
        this.tweens.add({ targets: aura, fillAlpha: 0.55, scaleX: 1.6, scaleY: 1.6, duration: 400, ease: 'Sine.easeOut' });
        this.tweens.add({ targets: aura, fillAlpha: 0.2, scaleX: 1.0, scaleY: 1.0, duration: 600, delay: 400, ease: 'Sine.easeIn', onComplete: () => aura.destroy() });
        this.showBanner('溜め斬り…  詠唱中', 900, null);
        this.addLog('エリシア', '溜め…', C.gold);
        this.time.delayedCall(820, () => this.afterPlayerAction());
        return;
      }

      // カウンタースタンス — no timing, just set the stance flag
      if (key === 'counter') {
        this.player.mp -= mpCost;
        this.refreshStatsUI();
        this.counterStance = true;
        sfx(this, 'se_guard', 0.6);
        sfx(this, 'se_magiccircle', 0.4);
        const sh = this.add.image(this.alicia.x, this.alicia.y - 60, 'shield')
          .setScale(0.1).setDepth(40).setAlpha(0).setTint(0xc89bff);
        this.tweens.add({ targets: sh, scale: 1.8, alpha: 1, duration: 220, ease: 'Back.out' });
        this.tweens.add({ targets: sh, alpha: 0, duration: 400, delay: 700, onComplete: () => sh.destroy() });
        this.spawnSpark(this.alicia.x, this.alicia.y - 70, 0xc89bff, 20);
        this.showBanner('カウンタースタンス！\n次の攻撃を完全防御', 900, null);
        this.time.delayedCall(820, () => this.afterPlayerAction());
        return;
      }

      const SKILLS = {
        heavy: { name: 'ヘヴィースラッシュ', vfx: 'slash', se: 'se_slash',   dmg: { PERFECT: 78, GOOD: 46, MISS: 18 }, flash: 0xfff2b0 },
        holy:  { name: 'ホーリー・レイン',   vfx: 'holy',  se: 'se_holy',    dmg: { PERFECT: 54, GOOD: 32, MISS: 12 }, flash: 0xfff2c0, heal: 0.22 },
        night: { name: 'ロード・オブ・ナイト', vfx: 'dark',  se: 'se_thunder', dmg: { PERFECT: 60, GOOD: 36, MISS: 14 }, flash: 0xbb66ff, lifesteal: 0.30 },
      };
      const s = SKILLS[key];
      this.player.mp -= mpCost;
      this.refreshStatsUI();
      this.startTiming({
        label: s.name, speed: 380, perfectHalf: 0.045, goodHalf: 0.15, timeout: 2400, mode: 'magic',
      }, (res) => {
        this.registerJudge(res);
        sfx(this, 'se_magiccircle', 0.45);
        this.aliciaIdle.pause();
        this.alicia.play('alicia_attack');
        this.time.delayedCall(260, () => {
          const dmg = s.dmg[res];
          sfx(this, s.se, 0.6);
          if (s.vfx === 'holy') this.holyPillar();
          else if (s.vfx === 'dark') { this.thunderStrike(res); this.spawnSpark(this.enemySprite.x, this.enemySprite.y - 60, 0xbb66ff, 16); }
          else this.spawnSlash(this.enemySprite.x, this.enemySprite.y - 60, res, 3, 2.3);
          this.dealToEnemy(dmg, res, res === 'PERFECT');
          this.flash(s.flash, res === 'MISS' ? 0.3 : 0.85, 200);
          this.cameras.main.shake(res === 'PERFECT' ? 300 : 160, res === 'PERFECT' ? 0.013 : 0.006);
          if (res === 'PERFECT') this.hitstop(75);
          if (s.heal) this.healPlayer(Math.round(this.player.maxHp * s.heal));
          if (s.lifesteal && res !== 'MISS') this.healPlayer(Math.round(dmg * s.lifesteal));
          this.aliciaIdle.resume();
          this.time.delayedCall(440, () => this.afterPlayerAction());
        });
      });
    }

    // ---- ATTACK: 3-hit timing combo --------------------------------
    doAttackCombo() {
      this.attackResults = [];
      this.runComboHit(0);
    }

    runComboHit(i) {
      if (i >= 3) { this.resolveCombo(); return; }
      const speed = 300 + i * 70; // each hit a touch faster
      this.startTiming({
        label: '斬撃  ' + (i + 1) + ' / 3',
        speed, perfectHalf: 0.05, goodHalf: 0.18, timeout: 2000, mode: 'attack',
      }, (res) => {
        this.attackResults.push(res);
        this.singleSlash(i, res);
        const last = i === 2;
        this.time.delayedCall(last ? 150 : 130, () => this.runComboHit(i + 1));
      });
    }

    singleSlash(i, res) {
      // Lunge Alicia toward the enemy + play attack frames.
      this.aliciaIdle.pause();
      this.alicia.play('alicia_attack');
      const lungeX = this.aliciaHome.x + 120 + i * 24;
      this.tweens.add({
        targets: this.alicia, x: lungeX, duration: 90, yoyo: true, ease: 'Quad.out',
        onComplete: () => { this.alicia.x = this.aliciaHome.x; },
      });
      sfx(this, res === 'MISS' ? 'se_hit' : (i === 2 ? 'se_slash' : 'se_fastslash'), 0.5);

      const dmgMap = { PERFECT: 20, GOOD: 11, MISS: 3 };
      let dmg = dmgMap[res];
      this.registerJudge(res);
      // slash VFX on enemy
      this.spawnSlash(this.enemySprite.x, this.enemySprite.y - 60, res, i);
      this.time.delayedCall(70, () => {
        this.dealToEnemy(dmg, res);
        if (res === 'PERFECT') { this.hitstop(60); this.cameras.main.shake(120, 0.006); }
      });
    }

    resolveCombo() {
      this.aliciaIdle.resume();
      const allPerfect = this.attackResults.every(r => r === 'PERFECT');
      if (allPerfect) {
        // PERFECT COMBO cinematic finisher
        this.time.delayedCall(100, () => {
          // Slow-mo + zoom in
          this.hitstop(160);
          this.cameras.main.zoomTo(1.08, 200, 'Sine.easeOut');
          this.time.delayedCall(220, () => {
            this.cameras.main.zoomTo(1.0, 260, 'Sine.easeIn');
            this.showBanner('★  P E R F E C T   C O M B O  ★', 800, null);
            sfx(this, 'se_explosion', 0.55);
            sfx(this, 'se_magiccircle', 0.4);
            this.flash(0xfff2b0, 0.9, 280);
            this.cameras.main.shake(340, 0.015);
            this.chromaHit(6);
            // Multi-slash burst
            for (let k = 0; k < 5; k++) {
              this.time.delayedCall(k * 38, () => {
                this.spawnSlash(
                  this.enemySprite.x + Phaser.Math.Between(-36, 36),
                  this.enemySprite.y - 60 + Phaser.Math.Between(-28, 18),
                  'PERFECT', k, 2.6 + k * 0.1
                );
              });
            }
            this.dealToEnemy(28, 'PERFECT', true);
            // シズ：パーフェクトコンボに反応して追撃 (60%)
            if (this.hasAlly('shizu') && this.enemy.hp > 0 && Math.random() < 0.6) {
              this.time.delayedCall(420, () => this.shizuFollowUp());
            } else {
              this.time.delayedCall(460, () => this.afterPlayerAction());
            }
          });
        });
      } else {
        this.time.delayedCall(160, () => this.afterPlayerAction());
      }
    }

    // ---- GUARD ------------------------------------------------------
    doGuard() {
      this.guarding = true;
      this.player.mp = Math.min(this.player.maxMp, this.player.mp + 10);
      this.refreshStatsUI();
      sfx(this, 'se_guard', 0.6);
      const sh = this.add.image(this.alicia.x, this.alicia.y - 60, 'shield')
        .setScale(0.1).setDepth(40).setAlpha(0);
      this.tweens.add({ targets: sh, scale: 1.6, alpha: 1, duration: 200, ease: 'Back.out' });
      this.tweens.add({ targets: sh, alpha: 0, duration: 300, delay: 600, onComplete: () => sh.destroy() });
      this.popText(this.alicia.x, this.alicia.y - 130, '+10 MP', C.blue, 20);
      this.flashBanner('防御の構え！', C.green);
      this.time.delayedCall(700, () => this.afterPlayerAction());
    }

    // ---- OVERDRIVE: cinematic ultimate (no timing — earned payoff) --
    doSpecial() {
      this.player.sp = 0;
      this.refreshStatsUI();
      this.state = 'OVER'; // lock input during the cinematic
      sfx(this, 'se_slowmo', 0.6);
      this.showBanner('★  O V E R D R I V E  ★\n光刃 ・ 終焉斬', 1100, null);

      // Charge-up: Alicia glows and rises.
      this.aliciaIdle.pause();
      this.alicia.setTint(0xfff2b0);
      this.tweens.add({
        targets: this.alicia, y: this.aliciaHome.y - 26, scaleX: 2.75, scaleY: 2.75,
        duration: 560, yoyo: true, ease: 'Sine.inOut',
      });
      this.spawnSpark(this.alicia.x, this.alicia.y - 60, C.goldN, 26);
      this.time.delayedCall(620, () => {
        sfx(this, 'se_magiccircle', 0.6);
        this.flash(0xffffff, 0.45, 200);
        this.spawnSpark(this.alicia.x, this.alicia.y - 60, 0xffffff, 22);
      });

      // The strike.
      this.time.delayedCall(1080, () => {
        sfx(this, 'se_holy', 0.75);
        sfx(this, 'se_explosion', 0.55);
        this.alicia.play('alicia_attack');
        this.tweens.add({ targets: this.alicia, x: this.enemySprite.x - 140, duration: 130, yoyo: true, ease: 'Quad.out',
          onComplete: () => { this.alicia.x = this.aliciaHome.x; } });
        for (let k = 0; k < 6; k++) {
          this.time.delayedCall(k * 60, () => {
            this.spawnSlash(this.enemySprite.x + Phaser.Math.Between(-44, 44),
              this.enemySprite.y - 60 + Phaser.Math.Between(-36, 24), 'PERFECT', k, 2.3);
          });
        }
        this.holyPillar();
        this.flash(0xfff2c0, 0.95, 420);
        this.cameras.main.shake(520, 0.02);
        this.hitstop(120);
        this.dealToEnemy(150, 'PERFECT', true);
      });

      this.time.delayedCall(1760, () => {
        this.alicia.clearTint();
        this.alicia.setScale(2.4);
        this.alicia.y = this.aliciaHome.y;
        this.aliciaIdle.resume();
        this.afterPlayerAction();
      });
    }

    holyPillar() {
      const x = this.enemySprite.x, baseY = this.enemySprite.y - 40;
      const p = this.add.rectangle(x, baseY - 80, 76, 320, 0xfff2c0, 0.85)
        .setDepth(22).setBlendMode(Phaser.BlendModes.ADD);
      this.tweens.add({ targets: p, scaleX: 1.7, alpha: 0, duration: 520, ease: 'Quad.out', onComplete: () => p.destroy() });
      const ring = this.add.image(x, baseY, 'slash').setDepth(21).setScale(0.4)
        .setTint(0xfff2c0).setBlendMode(Phaser.BlendModes.ADD);
      this.tweens.add({ targets: ring, scale: 4, alpha: 0, duration: 460, onComplete: () => ring.destroy() });
      this.spawnSpark(x, baseY, 0xfff2c0, 30);
      this.spawnSpark(x, baseY, 0xffffff, 18);
    }

    afterPlayerAction() {
      if (this.enemy.hp <= 0) { this.onEnemyDefeated(); return; }
      if (this.phase2Pending) {
        this.phase2Pending = false;
        this.runPhase2Cinematic();
        return;
      }
      this.enemyTurn();
    }

    runPhase2Cinematic() {
      this.state = 'OVER';
      this.setMenuVisible(false);
      this.setSkillMenuVisible(false);

      sfx(this, 'se_explosion', 0.68);
      sfx(this, 'se_slowmo', 0.55);
      this.cameras.main.shake(900, 0.028);
      this.flash(0xffffff, 0.95, 500);

      stopBgm(this);

      // Dark background transition
      this.tweens.add({ targets: this.bgImage, alpha: 0.5, duration: 1200 });
      this.tweens.add({ targets: this.darkBgOverlay, alpha: 0.70, duration: 1200 });

      // Enemy: full HP restore + dramatic tint
      this.time.delayedCall(500, () => {
        this.enemy.hp = this.enemy.maxHp;
        this.enemyBar.set(this.enemy.maxHp, true);
        sfx(this, 'se_magiccircle', 0.65);
        this.spawnSpark(this.enemySprite.x, this.enemySprite.y - 70, 0xcc00ff, 40);
        this.spawnSpark(this.enemySprite.x, this.enemySprite.y - 70, 0xffffff, 22);
        this.popText(this.enemySprite.x, this.enemySprite.y - 130, 'HP 全 回 復 ！', '#ee88ff', 30);
        this.enemySprite.setTint(0xaa00ff);
        this.tweens.add({ targets: this.rageVignette, alpha: { from: 0, to: 0.32 }, duration: 700, yoyo: true, repeat: -1 });
      });

      // Big banner
      this.time.delayedCall(700, () => {
        this.showBanner('― 封 印 解 除 ―\n' + this.enc.name + '\n第 二 形 態', 2000, null);
      });

      // BGM switch
      this.time.delayedCall(1400, () => lazyBgm(this, 'bgm_unleash', 0.46));

      // Purple particle storm
      this.time.delayedCall(800, () => {
        for (let k = 0; k < 4; k++) {
          this.time.delayedCall(k * 200, () => {
            this.spawnSpark(
              this.enemySprite.x + Phaser.Math.Between(-60, 60),
              this.enemySprite.y - 60 + Phaser.Math.Between(-40, 20),
              0xcc44ff, 18
            );
          });
        }
      });

      // Resume — player gets a free first turn (boss just recovered, feels fair)
      this.time.delayedCall(3000, () => {
        this.flashBanner('詠唱攻撃に備えよ！', C.red);
        this.time.delayedCall(500, () => this.startPlayerTurn());
      });
    }

    // ---- Enemy turn: telegraph -> parry timing ---------------------
    enemyTurn() {
      this.state = 'ENEMY';
      this.enemyTurnCount++;

      // Phase 2: a cast charged last turn now releases (unparryable — guard to soften).
      if (this.casting) { this.castRelease(); return; }

      // Boss (アリア) occasionally mends herself instead of attacking — [ダークヒール].
      if (this.enc.special && this.enemy.hp < this.enemy.maxHp * 0.55 &&
          this.enemy.hp > 0 && Math.random() < 0.2) {
        this.bossHeal();
        return;
      }

      // Phase 2: begin a cast (次ターンに詠唱攻撃).
      if (this.phase === 2 && this.enc.castAtk && Math.random() < 0.45) {
        this.castBegin();
        return;
      }

      const isSpecial = this.enc.specialEvery > 0 &&
        (this.enemyTurnCount % this.enc.specialEvery === 0 || (this.raging && this.enemyTurnCount % 2 === 0));

      // Telegraph
      sfx(this, isSpecial ? 'se_fly' : 'se_draw', 0.5);
      this.enemyIdle.pause();
      const tele = this.enc.telegraph;
      // windup: pull back + glow
      this.tweens.add({
        targets: this.enemySprite, x: this.enemyHome.x + 30, duration: tele * 0.6,
        ease: 'Quad.out', yoyo: false,
      });
      this.enemySprite.setTint(isSpecial ? 0xff7070 : 0xffd0d0);
      if (isSpecial) {
        sfx(this, 'se_magiccircle', 0.5);
        const moveName = this.enc.special ? ' の[ダークスラッシュ]！' : ' の渾身の一撃！';
        this.flashBanner('⚠  ' + this.enc.name + moveName, C.red);
      } else {
        this.showHint('タイミングよく ガード！');
      }

      this.time.delayedCall(tele, () => {
        this.restoreEnemyTint();
        this.startParry(isSpecial);
      });
    }

    // Boss self-heal — a momentum-swing the player must race against.
    bossHeal() {
      sfx(this, 'se_magiccircle', 0.5);
      const heal = Math.round(this.enemy.maxHp * 0.11);
      this.enemy.hp = Math.min(this.enemy.maxHp, this.enemy.hp + heal);
      this.enemyBar.set(this.enemy.hp);
      this.flashBanner(this.enc.name + ' の [ダークヒール]！', '#c89bff');
      this.popText(this.enemySprite.x, this.enemySprite.y - 90, '+' + heal, '#54e08a', 32);
      this.spawnSpark(this.enemySprite.x, this.enemySprite.y - 55, 0xb366ff, 20);
      const aura = this.add.image(this.enemySprite.x, this.enemySprite.y - 50, 'shield')
        .setScale(0.2).setAlpha(0.8).setTint(0xb366ff).setDepth(22).setBlendMode(Phaser.BlendModes.ADD);
      this.tweens.add({ targets: aura, scale: 2.4, alpha: 0, duration: 600, onComplete: () => aura.destroy() });
      this.time.delayedCall(950, () => {
        this.guarding = false;
        this.maybeEnterRage();
        this.startPlayerTurn();
      });
    }

    // ---- Phase 2: 詠唱攻撃 (cast attack) ----------------------------
    // Charge this turn (no damage); the player should GUARD next turn.
    castBegin() {
      this.casting = true;
      this.enemyIdle.pause();
      sfx(this, 'se_magiccircle', 0.6);
      sfx(this, 'se_fly', 0.4);
      this.enemySprite.setTint(0xc060ff);
      const ring = this.add.image(this.enemySprite.x, this.enemySprite.y - 70, 'slash')
        .setScale(0.5).setTint(0xc060ff).setAlpha(0.9).setDepth(22).setBlendMode(Phaser.BlendModes.ADD);
      this.tweens.add({ targets: ring, angle: 200, scale: 2.3, alpha: 0.25, duration: 1100, ease: 'Quad.in', onComplete: () => ring.destroy() });
      this.spawnSpark(this.enemySprite.x, this.enemySprite.y - 60, 0xc060ff, 16);
      this.flashBanner('⚠ ' + this.enc.name + ' が詠唱を始めた！\n次ターン 詠唱攻撃 ―「ぼうぎょ」で備えよ！', C.red);
      this.time.delayedCall(1300, () => {
        this.restoreEnemyTint();
        this.startPlayerTurn();
      });
    }

    // Release the charged cast: UNPARRYABLE. Guarding (ぼうぎょ last turn) softens it.
    castRelease() {
      this.casting = false;
      this.enemyIdle.pause();
      this.enemySprite.setTint(0xc060ff);
      this.flashBanner(this.enc.name + ' の 詠唱攻撃！', C.red);
      this.tweens.add({ targets: this.enemySprite, x: this.aliciaHome.x + 170, duration: 200, yoyo: true, ease: 'Quad.in',
        onComplete: () => { this.enemySprite.x = this.enemyHome.x; this.enemyIdle.resume(); } });
      this.time.delayedCall(440, () => {
        sfx(this, 'se_explosion', 0.6);
        sfx(this, 'se_thunder', 0.5);
        let dmg = Math.round(this.enc.castAtk * (this.raging ? 1.05 : 1));
        let label, lcolor;
        if (this.guarding) { dmg = Math.round(dmg * 0.4); label = '詠唱攻撃を防御！'; lcolor = C.green; sfx(this, 'se_guard', 0.6); }
        else { label = '詠唱攻撃 直撃！'; lcolor = C.red; }
        const pillar = this.add.rectangle(this.alicia.x, this.alicia.y - 80, 84, 340, 0xc060ff, 0.85)
          .setDepth(22).setBlendMode(Phaser.BlendModes.ADD);
        this.tweens.add({ targets: pillar, scaleX: 1.7, alpha: 0, duration: 440, onComplete: () => pillar.destroy() });
        this.spawnSpark(this.alicia.x, this.alicia.y - 70, 0xc060ff, 28);
        this.cameras.main.shake(460, 0.02);
        this.flash(0xff3060, 0.7, 320);
        this.restoreEnemyTint();
        this.time.delayedCall(150, () => {
          this.dealToPlayer(dmg, label, lcolor);
          if (this.player.hp <= 0) { this.time.delayedCall(700, () => this.onPlayerDefeated()); return; }
          this.time.delayedCall(680, () => { this.guarding = false; this.startPlayerTurn(); });
        });
      });
    }

    startParry(isSpecial) {
      const w = this.curWave();
      const baseAtk = isSpecial ? (w.specialAtk || w.atk * 1.7) : w.atk;
      const rageBonus = this.raging ? 1.25 : 1; // phase 2 hits harder
      const incoming = Math.round(baseAtk * rageBonus);
      const wider = this.guarding ? 0.06 : 0;
      this.startTiming({
        label: isSpecial ? 'パリィ！ (強敵の一撃)' : 'ガード タイミング',
        speed: this.enc.parrySpeed * (isSpecial ? 1.12 : 1) * (this.raging ? 1.1 : 1),
        perfectHalf: 0.055 + wider, goodHalf: 0.18 + wider,
        timeout: 1900, mode: 'parry',
      }, (res) => {
        this.resolveEnemyHit(res, incoming);
      });
    }

    resolveEnemyHit(res, incoming) {
      // Enemy lunge to player
      this.tweens.add({
        targets: this.enemySprite, x: this.aliciaHome.x + 150, duration: 130,
        yoyo: true, ease: 'Quad.in',
        onComplete: () => { this.enemySprite.x = this.enemyHome.x; this.enemyIdle.resume(); },
      });

      // カウンタースタンス: absorb the hit entirely
      if (this.counterStance) {
        this.counterStance = false;
        sfx(this, 'se_clash', 0.7);
        this.spawnSpark(this.alicia.x, this.alicia.y - 70, 0xc89bff, 28);
        this.flash(0xffffff, 0.5, 160);
        this.cameras.main.shake(120, 0.006);
        this.dealToPlayer(0, 'カウンター防御！完全無効！', '#c89bff');
        this.registerJudge('PERFECT');
        this.time.delayedCall(700, () => { this.maybeEnterRage(); this.startPlayerTurn(); });
        return;
      }

      let dmg = incoming;
      if (this.guarding) dmg = Math.round(dmg * 0.5);

      let label, lcolor;
      const didParry = res === 'PERFECT';
      if (didParry) {
        dmg = Math.round(dmg * 0.1);
        label = 'パリィ成功！'; lcolor = C.gold;
        this.player.mp = Math.min(this.player.maxMp, this.player.mp + 6);
        this.registerJudge('PERFECT');
        sfx(this, 'se_clash', 0.6);
        this.spawnSpark(this.alicia.x, this.alicia.y - 70, C.goldN, 22);
        this.flash(0xffffff, 0.4, 120);
      } else if (res === 'GOOD') {
        dmg = Math.round(dmg * 0.5);
        label = 'ガード'; lcolor = C.green;
        this.combo = 0; this.updateCombo();
        sfx(this, 'se_guard', 0.5);
        this.spawnSpark(this.alicia.x, this.alicia.y - 70, C.greenN, 12);
      } else {
        label = '直撃！'; lcolor = C.red;
        this.combo = 0; this.updateCombo();
        sfx(this, 'se_hit', 0.6);
        this.cameras.main.shake(260, 0.011);
        this.flash(0xff3040, 0.5, 180);
      }

      // ノエル (守護): 被弾時に確率(30%)でダメージを軽減
      if (dmg > 0 && !didParry && this.hasAlly('noel') && Math.random() < 0.3) {
        dmg = Math.max(1, Math.round(dmg * 0.55));
        this.allyAct('noel', '守護！');
        this.spawnSpark(this.alicia.x, this.alicia.y - 70, COMPANIONS.noel.color, 14);
      }

      this.time.delayedCall(120, () => {
        this.dealToPlayer(dmg, label, lcolor);
        if (this.player.hp <= 0) { this.time.delayedCall(700, () => this.onPlayerDefeated()); return; }

        // パリィからの反撃 ability
        if (didParry && this.abilityParry && this.enemy.hp > 0) {
          this.time.delayedCall(400, () => this.startParryCounter());
        } else {
          this.time.delayedCall(650, () => { this.guarding = false; this.maybeEnterRage(); this.startPlayerTurn(); });
        }
      });
    }

    startParryCounter() {
      this.flashBanner('反撃チャンス！', C.gold);
      sfx(this, 'se_fastslash', 0.4);
      this.startTiming({
        label: '反撃！ カウンター', speed: 550, perfectHalf: 0.07, goodHalf: 0.20, timeout: 1600, mode: 'attack',
      }, (res) => {
        const dmgMap = { PERFECT: 34, GOOD: 17, MISS: 0 };
        const dmg = dmgMap[res];
        if (dmg > 0) {
          this.aliciaIdle.pause();
          this.alicia.play('alicia_attack');
          this.tweens.add({ targets: this.alicia, x: this.aliciaHome.x + 80, duration: 80, yoyo: true, ease: 'Quad.out',
            onComplete: () => { this.alicia.x = this.aliciaHome.x; this.aliciaIdle.resume(); } });
          sfx(this, res === 'PERFECT' ? 'se_slash' : 'se_fastslash', 0.55);
          this.spawnSlash(this.enemySprite.x, this.enemySprite.y - 60, res, 0, 1.8);
          this.time.delayedCall(80, () => {
            this.dealToEnemy(dmg, res);
            if (res === 'PERFECT') { this.hitstop(55); this.cameras.main.shake(120, 0.007); this.registerJudge('PERFECT'); }
          });
        } else {
          sfx(this, 'se_hit', 0.25);
        }
        this.time.delayedCall(520, () => { this.guarding = false; this.maybeEnterRage(); this.startPlayerTurn(); });
      });
    }

    // ---- Damage application ----------------------------------------
    dealToEnemy(dmg, res, big) {
      // シズ passive (狙撃支援): PERFECT判定のダメージ +20%
      if (res === 'PERFECT' && this.hasAlly('shizu')) dmg = Math.round(dmg * 1.2);
      this.enemy.hp = Math.max(0, this.enemy.hp - dmg);
      this.enemyBar.set(this.enemy.hp);
      const col = res === 'PERFECT' ? C.gold : (res === 'GOOD' ? C.white : '#bdbdd0');
      const size = res === 'PERFECT' ? (big ? 52 : 40) : (res === 'MISS' ? 24 : 32);
      const tag = res === 'MISS' ? 'MISS ' : '';
      this.popText(this.enemySprite.x + Phaser.Math.Between(-20, 20), this.enemySprite.y - 90, tag + dmg, col, size);
      this.enemySprite.setTint(0xff8888);
      this.time.delayedCall(90, () => this.restoreEnemyTint());
      this.tweens.add({ targets: this.enemySprite, x: this.enemyHome.x + 14, duration: 50, yoyo: true });
      if (res !== 'MISS') sfx(this, 'se_hit', 0.3);
      if (res === 'PERFECT' && big) this.chromaHit(5);
      const encShortName = this.enc.name.split(' ').pop();
      this.addLog((res === 'PERFECT' ? '★' : '') + encShortName, res !== 'MISS' ? '-' + dmg : 'MISS', res === 'PERFECT' ? C.gold : col);
      this.maybeEnterRage();
      this.checkBossVoice();
    }

    dealToPlayer(dmg, label, lcolor) {
      this.player.hp = Math.max(0, this.player.hp - dmg);
      this.refreshStatsUI();
      this.flashBanner(label, lcolor);
      this.popText(this.alicia.x + Phaser.Math.Between(-16, 16), this.alicia.y - 120,
        dmg > 0 ? '-' + dmg : '0', lcolor, dmg > 0 ? 32 : 22);
      if (dmg > 0) {
        this.alicia.setTint(0xff8080);
        this.time.delayedCall(100, () => { if (this.alicia.active) this.alicia.clearTint(); });
        this.addLog('エリシア', '-' + dmg, C.red);
        if (dmg >= 30) this.chromaHit(8);
      } else {
        this.addLog('エリシア', label.slice(0, 10), lcolor);
      }
    }

    chromaHit(px = 5) {
      const c = this.game.canvas;
      c.style.filter = 'saturate(2) contrast(1.2) brightness(1.3)';
      c.style.transform = `translate(${px}px, 0)`;
      window.setTimeout(() => {
        c.style.transform = `translate(-${px}px, 0)`;
        window.setTimeout(() => { c.style.filter = ''; c.style.transform = ''; }, 55);
      }, 55);
    }

    addLog(label, detail, color) {
      this._logEntries = this._logEntries || [];
      this._logEntries.unshift({ label, detail, color: color || '#9a9ac0' });
      if (this._logEntries.length > 5) this._logEntries.pop();
      (this._logLines || []).forEach((t, i) => {
        const e = this._logEntries[i];
        t.setText(e ? (e.label + ' ' + e.detail) : '');
        t.setColor(e ? (i === 0 ? (e.color || '#e8e8ff') : '#6a6a90') : '#3a3a5a');
      });
    }

    checkBossVoice() {
      if (!this.enc.voice || this.enemy.hp <= 0) return;
      const ratio = this.enemy.hp / this.enemy.maxHp;
      for (const [threshold, text] of this.enc.voice) {
        const key = String(threshold);
        if (ratio <= threshold && !this.voiceShown[key]) {
          this.voiceShown[key] = true;
          this.showVoiceLine(this.enc.name.split(' ').pop(), text);
          break;
        }
      }
    }

    showVoiceLine(name, text) {
      const W = GAME_W, H = GAME_H;
      const box = this.add.rectangle(W / 2, H - 112, W - 44, 58, 0x060614, 0.92)
        .setStrokeStyle(2, 0x5533aa).setDepth(130).setAlpha(0);
      const nameT = this.add.text(42, H - 133, name + '：', {
        fontFamily: FONT, fontSize: '12px', color: '#c89bff', fontStyle: 'bold',
      }).setDepth(131).setAlpha(0).setOrigin(0, 0.5);
      const bodyT = this.add.text(42, H - 109, '「' + text + '」', {
        fontFamily: FONT, fontSize: '14px', color: '#e8e8ff',
      }).setDepth(131).setAlpha(0).setOrigin(0, 0.5);
      this.tweens.add({ targets: [box, nameT, bodyT], alpha: 1, duration: 220 });
      this.time.delayedCall(2400, () => {
        this.tweens.add({
          targets: [box, nameT, bodyT], alpha: 0, duration: 320,
          onComplete: () => { box.destroy(); nameT.destroy(); bodyT.destroy(); },
        });
      });
    }

    // ---- Phase 2 trigger ----------------------------------------
    // Sets a pending flag; the cinematic runs at the next afterPlayerAction boundary.
    maybeEnterRage() {
      if (this.raging || !this.enc.special || this.phase2Pending) return;
      const at = this.enc.phase2At || 0.5;
      if (this.enemy.hp > 0 && this.enemy.hp <= this.enemy.maxHp * at) {
        this.raging = true;
        this.phase = 2;
        this.phase2Pending = true;
      }
    }

    restoreEnemyTint() {
      if (!this.enemySprite.active) return;
      if (this.raging) this.enemySprite.setTint(0xaa00ff);
      else this.enemySprite.clearTint();
    }

    // ---- Next wave (same stage, e.g. 過去の幻影 2体目) --------------
    nextWave() {
      this.state = 'OVER';
      this.setMenuVisible(false);
      this.setSkillMenuVisible(false);
      sfx(this, 'se_down', 0.5);
      this.tweens.add({ targets: this.enemySprite, alpha: 0, y: '+=24', angle: 10, duration: 600, ease: 'Quad.in' });
      this.spawnSpark(this.enemySprite.x, this.enemySprite.y - 50, 0xffffff, 18);
      this.time.delayedCall(780, () => {
        this.waveIndex++;
        const w = this.curWave();
        this.enemy = { maxHp: w.hp, hp: w.hp };
        if (this.waitingSprite) { this.waitingSprite.destroy(); this.waitingSprite = null; }
        this.enemySprite.setAlpha(1).setAngle(0).clearTint();
        this.enemySprite.x = this.enemyHome.x;
        this.enemySprite.y = this.enemyHome.y;
        this.enemyShadow.setAlpha(0.35);
        this.enemyBar.max = w.hp;
        this.enemyBar.set(w.hp, false);
        this.enemyNameText.setText(this.enemyDisplayName());
        this.enemyTurnCount = 0;
        sfx(this, 'se_slowmo', 0.4);
        this.flashBanner((this.waveIndex + 1) + ' 体目 ・ ' + this.enc.name + ' 出現！', C.red);
        this.time.delayedCall(820, () => this.startPlayerTurn());
      });
    }

    // ---- Win / Lose -------------------------------------------------
    onEnemyDefeated() {
      // More waves in this stage? Bring up the next foe instead of ending.
      if (this.waveIndex < this.enc.waves.length - 1) { this.nextWave(); return; }
      this.state = 'OVER';
      this.setMenuVisible(false);
      sfx(this, 'se_down', 0.6);
      if (this.raging) this.tweens.killTweensOf(this.rageVignette), this.rageVignette.setAlpha(0);
      // enemy death
      this.tweens.add({
        targets: this.enemySprite, alpha: 0, y: '+=30', angle: 12, duration: 900, ease: 'Quad.in',
      });
      this.tweens.add({ targets: this.enemyShadow, alpha: 0, duration: 900 });
      this.spawnSpark(this.enemySprite.x, this.enemySprite.y - 50, 0xffffff, 26);
      this.flash(0xffffff, 0.6, 300);

      const isLast = this.encIndex >= ENCOUNTERS.length - 1;
      this.time.delayedCall(1100, () => {
        if (isLast) {
          this.cameras.main.fadeOut(700, 0, 0, 0);
          this.cameras.main.once('camerafadeoutcomplete', () => {
            this.scene.start('Ending', { stats: this.stats });
          });
          return;
        } else {
          // heal a bit and advance
          const healHp = Math.round(this.player.maxHp * 0.35);
          this.player.hp = Math.min(this.player.maxHp, this.player.hp + healHp);
          this.player.mp = Math.min(this.player.maxMp, this.player.mp + 10);
          this.refreshStatsUI();
          this.showBanner(this.enc.name + ' を 撃破！\nHP回復  +' + healHp, 1400, () => {
            this.cameras.main.fadeOut(400, 0, 0, 0);
            this.cameras.main.once('camerafadeoutcomplete', () => {
              this.scene.start('Battle', {
                index: this.encIndex + 1, hp: this.player.hp, mp: this.player.mp,
                sp: this.player.sp, stats: this.stats,
                abilityParry: this.abilityParry,
                selectedSkills: this.selectedSkills,
                firstAllyActDone: this.firstAllyActDone,
              });
            });
          });
        }
      });
    }

    onPlayerDefeated() {
      this.state = 'OVER';
      this.setMenuVisible(false);
      sfx(this, 'se_down', 0.7);
      this.alicia.setTint(0x555566);
      this.tweens.add({ targets: this.alicia, angle: -85, y: '+=20', alpha: 0.7, duration: 700, ease: 'Quad.in' });
      this.cameras.main.shake(300, 0.01);
      this.time.delayedCall(1200, () => {
        this.scene.start('Result', { win: false, stats: this.stats });
      });
    }

    /* ----------------------------------------------------------------
       TIMING MINIGAME (shared by attack / magic / parry)
       ---------------------------------------------------------------- */
    startTiming(opts, cb) {
      this.state = 'TIMING';
      this.timingLayer.removeAll(true);

      const cx = GAME_W / 2, cy = 300;
      const W = 360, H = 30;
      const left = cx - W / 2;

      // Panel
      this.timingLayer.add(this.add.rectangle(cx, cy, W + 50, H + 70, 0x0a0a16, 0.78)
        .setStrokeStyle(2, 0x44446a));
      this.timingLayer.add(this.add.text(cx, cy - 40, opts.label, {
        fontFamily: FONT, fontSize: '16px', color: C.white, fontStyle: 'bold',
      }).setOrigin(0.5));

      // Bar background
      this.timingLayer.add(this.add.rectangle(cx, cy, W, H, 0x1a1a2c).setStrokeStyle(2, 0x000000));
      // Good zone
      const goodW = W * opts.goodHalf * 2;
      const goodColor = opts.mode === 'parry' ? 0x4a90d9 : C.greenN;
      this.timingLayer.add(this.add.rectangle(cx, cy, goodW, H - 4, goodColor, 0.45));
      // Perfect zone
      const perfW = W * opts.perfectHalf * 2;
      this.timingLayer.add(this.add.rectangle(cx, cy, perfW, H - 4, C.goldN, 0.9));
      // center hint line
      this.timingLayer.add(this.add.rectangle(cx, cy, 2, H + 8, 0xffffff, 0.5));

      // Cursor
      const cursor = this.add.rectangle(left, cy, 6, H + 16, 0xffffff)
        .setStrokeStyle(2, 0x000000);
      this.timingLayer.add(cursor);

      // hint
      this.timingLayer.add(this.add.text(cx, cy + 42, 'SPACE / ENTER / クリック', {
        fontFamily: FONT, fontSize: '12px', color: '#9a9ac0',
      }).setOrigin(0.5));

      // make whole screen tappable to hit
      const hit = this.add.rectangle(cx, cy, GAME_W, 180, 0x000000, 0.001).setInteractive();
      hit.on('pointerdown', () => this.pressTiming(false));
      this.timingLayer.add(hit);

      this.timing = {
        cb, cursor, left, W, cy,
        x: 0, dir: 1, speed: opts.speed,
        perfectHalf: W * opts.perfectHalf, goodHalf: W * opts.goodHalf,
        elapsed: 0, timeout: opts.timeout, done: false, mode: opts.mode,
      };
    }

    update(time, delta) {
      const tm = this.timing;
      if (!tm || tm.done) return;
      tm.x += tm.dir * tm.speed * (delta / 1000);
      if (tm.x >= tm.W) { tm.x = tm.W; tm.dir = -1; }
      if (tm.x <= 0) { tm.x = 0; tm.dir = 1; }
      tm.cursor.x = tm.left + tm.x;
      tm.elapsed += delta;
      if (tm.elapsed >= tm.timeout) this.pressTiming(true);
    }

    pressTiming(forced) {
      const tm = this.timing;
      if (!tm || tm.done) return;
      tm.done = true;

      const offset = Math.abs(tm.x - tm.W / 2);
      let res;
      if (forced) res = 'MISS';
      else if (offset <= tm.perfectHalf) res = 'PERFECT';
      else if (offset <= tm.goodHalf) res = 'GOOD';
      else res = 'MISS';

      // freeze cursor + flash judgment
      tm.cursor.setFillStyle(res === 'PERFECT' ? C.goldN : (res === 'GOOD' ? C.greenN : C.redN));
      const jcol = res === 'PERFECT' ? C.gold : (res === 'GOOD' ? C.green : C.red);
      const jt = this.add.text(GAME_W / 2, tm.cy - 76, res + (forced ? ' (おそい)' : ''), {
        fontFamily: FONT, fontSize: '30px', color: jcol, fontStyle: 'bold',
        stroke: C.ink, strokeThickness: 6,
      }).setOrigin(0.5).setDepth(75).setScale(0.4);
      this.tweens.add({ targets: jt, scale: 1, duration: 160, ease: 'Back.out' });
      this.tweens.add({ targets: jt, alpha: 0, y: '-=24', delay: 360, duration: 300, onComplete: () => jt.destroy() });

      this.time.delayedCall(200, () => {
        this.timingLayer.removeAll(true);
        this.timing = null;
        tm.cb(res);
      });
    }

    // ---- Combo bookkeeping -----------------------------------------
    registerJudge(res) {
      if (res === 'PERFECT') {
        this.combo++;
        this.stats.perfect++;
        if (this.combo > this.stats.maxCombo) this.stats.maxCombo = this.combo;
        this.addSp(15);
      } else if (res === 'GOOD') {
        this.addSp(6);
      } else if (res === 'MISS') {
        this.combo = 0;
      }
      this.updateCombo();
    }

    addSp(n) {
      const was = this.player.sp >= this.player.maxSp;
      this.player.sp = Math.min(this.player.maxSp, this.player.sp + n);
      this.refreshStatsUI();
      if (!was && this.player.sp >= this.player.maxSp) {
        // Just charged — announce it.
        sfx(this, 'se_magiccircle', 0.4);
        this.popText(this.spReadyText.x - 24, 510, 'OVERDRIVE!', C.gold, 18);
      }
    }

    updateCombo() {
      if (this.combo >= 2) {
        this.comboText.setText('COMBO  ×' + this.combo);
        this.comboText.setAlpha(1).setScale(1.3);
        this.tweens.add({ targets: this.comboText, scale: 1, duration: 200, ease: 'Back.out' });
      } else {
        this.tweens.add({ targets: this.comboText, alpha: 0, duration: 200 });
      }
    }

    /* ----------------------------------------------------------------
       VFX helpers
       ---------------------------------------------------------------- */
    spawnSlash(x, y, res, i, scaleMul) {
      const s = this.add.image(x, y, 'slash')
        .setDepth(20).setScale((1.4 + (i || 0) * 0.1) * (scaleMul || 1))
        .setAngle(Phaser.Math.Between(-30, 30) + (i % 2 ? 180 : 0))
        .setBlendMode(Phaser.BlendModes.ADD);
      if (res === 'PERFECT') s.setTint(0xffe6a0);
      else if (res === 'MISS') s.setTint(0x8888aa).setAlpha(0.6);
      this.tweens.add({
        targets: s, scaleX: s.scaleX * 1.5, scaleY: s.scaleY * 1.5, alpha: 0,
        duration: 260, ease: 'Quad.out', onComplete: () => s.destroy(),
      });
      if (res === 'PERFECT') this.spawnSpark(x, y, 0xffe6a0, 10);
    }

    thunderStrike(res) {
      // Vertical bolt via stacked rectangles + spark burst.
      const x = this.enemySprite.x, topY = 0, botY = this.enemySprite.y - 30;
      const colors = res === 'MISS' ? [0x99bbff] : [0xffffff, 0xbfe0ff, 0x7fc0ff];
      for (let k = 0; k < (res === 'MISS' ? 1 : 3); k++) {
        const seg = this.add.rectangle(x + Phaser.Math.Between(-10, 10), (topY + botY) / 2, 8, botY - topY, colors[k % colors.length])
          .setDepth(22).setBlendMode(Phaser.BlendModes.ADD).setAlpha(0.9);
        this.tweens.add({ targets: seg, alpha: 0, scaleX: 0.2, duration: 260, delay: k * 40, onComplete: () => seg.destroy() });
      }
      this.spawnSpark(x, botY - 20, res === 'MISS' ? 0x99bbff : 0xbfe0ff, res === 'MISS' ? 8 : 24);
    }

    spawnSpark(x, y, color, count) {
      const p = this.add.particles(x, y, 'spark', {
        speed: { min: 80, max: 320 }, angle: { min: 0, max: 360 },
        scale: { start: 0.7, end: 0 }, lifespan: { min: 250, max: 600 },
        quantity: count, blendMode: 'ADD', tint: color, emitting: false,
      }).setDepth(25);
      p.explode(count);
      this.time.delayedCall(700, () => p.destroy());
    }

    /* ----------------------------------------------------------------
       UI helpers
       ---------------------------------------------------------------- */
    refreshStatsUI(animate = true) {
      this.hpBar.set(this.player.hp, animate);
      this.mpBar.set(this.player.mp, animate);
      this.spBar.set(this.player.sp, animate);
      this.hpText.setText(this.player.hp + ' / ' + this.player.maxHp);
      this.mpText.setText(this.player.mp + ' / ' + this.player.maxMp);
      if (this.spReadyText) this.spReadyText.setVisible(this.player.sp >= this.player.maxSp);
    }

    popText(x, y, text, color, size) {
      const t = this.add.text(x, y, text, {
        fontFamily: FONT, fontSize: size + 'px', color, fontStyle: 'bold',
        stroke: C.ink, strokeThickness: 5,
      }).setOrigin(0.5).setDepth(110).setScale(0.5);
      this.tweens.add({ targets: t, scale: 1, duration: 150, ease: 'Back.out' });
      this.tweens.add({ targets: t, y: y - 60, alpha: 0, delay: 250, duration: 650, ease: 'Quad.out', onComplete: () => t.destroy() });
    }

    showBanner(text, dur, cb) {
      this.banner.setText(text).setAlpha(0).setScale(0.7);
      this._bannerSkippable = false;
      this.tweens.add({ targets: this.banner, alpha: 1, scale: 1, duration: 220, ease: 'Back.out' });
      this.time.delayedCall(dur, () => {
        this.tweens.add({
          targets: this.banner, alpha: 0, duration: 250,
          onComplete: () => { if (cb) cb(); },
        });
      });
    }

    flashBanner(text, color) {
      const t = this.add.text(GAME_W / 2, 210, text, {
        fontFamily: FONT, fontSize: '26px', color, fontStyle: 'bold',
        stroke: C.ink, strokeThickness: 6,
      }).setOrigin(0.5).setDepth(115).setScale(0.6);
      this.tweens.add({ targets: t, scale: 1, duration: 160, ease: 'Back.out' });
      this.tweens.add({ targets: t, alpha: 0, y: '-=18', delay: 600, duration: 350, onComplete: () => t.destroy() });
    }

    showHint(text) {
      this.clearHint();
      this.hint = this.add.text(GAME_W / 2, 170, text, {
        fontFamily: FONT, fontSize: '15px', color: '#c7c7e0',
      }).setOrigin(0.5).setDepth(60);
      this.tweens.add({ targets: this.hint, alpha: { from: 0.4, to: 1 }, duration: 600, yoyo: true, repeat: -1 });
    }
    clearHint() { if (this.hint) { this.hint.destroy(); this.hint = null; } }

    flash(color, alpha, dur) {
      this.flashRect.setFillStyle(color).setAlpha(alpha);
      this.tweens.add({ targets: this.flashRect, alpha: 0, duration: dur });
    }

    hitstop(ms) {
      this.tweens.timeScale = 0.0001; this.time.timeScale = 0.0001;
      window.setTimeout(() => { this.tweens.timeScale = 1; this.time.timeScale = 1; }, ms);
    }
  }

        { sp: '',         tx: 'かつての友を、討ち果たした…' },
      ];
      this.lines = LINES;
      this.page = -1;

      // Aria silhouette (right, faded)
      this.ariaImg = this.add.sprite(W * 0.73, GROUND_Y + 4, 'enemy3')
        .setOrigin(0.5, 1).setScale(2.5).setAlpha(0).setTint(0x6633aa);
      if (this.anims.exists('demon_idle')) this.ariaImg.play('demon_idle');
      // Alicia sprite (left)
      this.aliciaImg = this.add.sprite(W * 0.29, GROUND_Y + 4, 'main')
        .setOrigin(0.5, 1).setScale(2.4).setAlpha(0);

      // Dialogue box
      this.dlgBox = this.add.rectangle(W / 2, H - 82, W - 52, 108, 0x060614, 0.92)
        .setStrokeStyle(2, 0x4433aa).setDepth(10).setAlpha(0);
      this.dlgSpeaker = this.add.text(44, H - 136, '', {
        fontFamily: FONT, fontSize: '13px', color: '#c89bff', fontStyle: 'bold',
      }).setDepth(11).setAlpha(0).setOrigin(0, 0.5);
      this.dlgText = this.add.text(44, H - 108, '', {
        fontFamily: FONT, fontSize: '17px', color: '#e8e8ff',
        wordWrap: { width: W - 100 },
      }).setDepth(11).setAlpha(0).setOrigin(0, 0.5);
      this.dlgHint = this.add.text(W - 44, H - 42, '▶', {
        fontFamily: FONT, fontSize: '14px', color: '#6a6a9a',
      }).setOrigin(1, 0.5).setDepth(11);
      this.tweens.add({ targets: this.dlgHint, alpha: { from: 1, to: 0.3 }, duration: 600, yoyo: true, repeat: -1 });

      this.cameras.main.fadeIn(900, 0, 0, 0);
      this.time.delayedCall(400, () => this.advance());

      this.input.keyboard.on('keydown-ENTER', () => this.advance());
      this.input.keyboard.on('keydown-SPACE', () => this.advance());
      this.input.on('pointerdown', () => this.advance());
    }

    advance() {
      this.page++;
      if (this.page >= this.lines.length) { this.finish(); return; }
      const d = this.lines[this.page];
      sfx(this, 'se_draw', 0.18);

      if (this.page === 0) {
        this.tweens.add({ targets: [this.aliciaImg, this.ariaImg, this.dlgBox, this.dlgSpeaker, this.dlgText], alpha: 1, duration: 500 });
      }
      this.dlgSpeaker.setText(d.sp ? d.sp + '：' : '');
      this.dlgText.setText(d.tx);

      const isAlicia = d.sp === 'エリシア';
      const isAria   = d.sp === 'アリア';
      this.aliciaImg.setAlpha(isAlicia ? 1.0 : 0.45);
      this.ariaImg.setAlpha(isAria ? 0.80 : 0.30);
      if (d.sp === '―' || d.sp === '') {
        this.aliciaImg.setAlpha(0.3);
        this.ariaImg.setAlpha(0.15);
      }
    }

    finish() {
      if (this._done) return; this._done = true;
      this.cameras.main.fadeOut(900, 0, 0, 0);
      this.cameras.main.once('camerafadeoutcomplete', () => {
        this.scene.start('Result', { win: true, stats: this.stats });
      });
    }
  }
